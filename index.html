<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veda AI Chatbot</title>
    <style>
        :root { 
            --primary: #7c3aed; --bg: #0b1120; --card: #1e293b; 
            --text: #f1f5f9; --secondary: #94a3b8; --border: rgba(255,255,255,0.1);
        }
        .light-mode {
            --bg: #f1f5f9; --card: #ffffff; --text: #0f172a;
            --secondary: #64748b; --border: rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100dvh; display: flex; overflow: hidden; }
        
        #sidebar { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: #0f172a; z-index: 1000; padding: 25px; box-shadow: 20px 0 50px rgba(0,0,0,0.5); color: white; }
        #sidebar.active { left: 0; }
        .side-item { width: 100%; padding: 14px; margin-bottom: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 12px; }

        main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
        header { padding: 15px 20px; display: flex; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); }
        .menu-btn { font-size: 24px; cursor: pointer; color: var(--primary); margin-right: 15px; }
        .logo-text { font-weight: 800; color: var(--primary); font-size: 1.2rem; flex: 1; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; }
        .msg { max-width: 85%; display: flex; flex-direction: column; }
        .user { align-self: flex-end; }
        .bot { align-self: flex-start; }
        .bubble { padding: 12px 18px; border-radius: 20px; font-size: 15px; line-height: 1.6; word-wrap: break-word; }
        .user .bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .bot .bubble { background: var(--card); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        
        .msg-tools { display: flex; gap: 12px; margin-top: 5px; padding: 0 5px; }
        .tool-icon { font-size: 14px; cursor: pointer; color: var(--secondary); }

        .typing-bubble { display: none; align-self: flex-start; background: var(--card); padding: 10px 20px; border-radius: 20px; margin-bottom: 10px; border: 1px solid var(--border); }
        .dot { height: 8px; width: 8px; background: var(--primary); border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .input-area { position: absolute; bottom: 0; width: 100%; padding: 15px 20px; background: linear-gradient(transparent, var(--bg) 50%); }
        .input-container { background: var(--card); border-radius: 50px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid var(--border); }
        input { flex: 1; background: none; border: none; color: var(--text); padding: 12px; outline: none; font-size: 16px; }
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--secondary); }
        #send-btn { color: var(--primary); font-size: 24px; }
    </style>
</head>
<body>

<nav id="sidebar">
    <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
        <h3 style="margin:0">Veda Assistant</h3>
        <span onclick="toggleMenu()" style="cursor:pointer; font-size:24px;">✕</span>
    </div>
    <button class="side-item" id="theme-toggle">🌓 Switch Appearance</button>
    <button class="side-item" onclick="saveChat()">💾 Save Chat Log</button>
    <button class="side-item" onclick="clearChat()">🗑️ Clear Conversation</button>
    <button class="side-item" onclick="sendFeedback()">📧 Send Feedback</button>
</nav>

<main>
    <header>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="logo-text">VEDA AI</div>
        <div style="font-size:9px; color:var(--secondary)" id="uid">Loading...</div>
    </header>
    <div id="chat-box"></div>
    <div class="typing-bubble" id="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="input-area">
        <div class="input-container">
            <button class="icon-btn" id="voice-btn">🎤</button>
            <input type="text" id="user-in" placeholder="Ask anything..." autocomplete="off">
            <button class="icon-btn" id="send-btn">➤</button>
        </div>
    </div>
</main>

<script src="responses.js"></script>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-in');
    const loader = document.getElementById('loader');
    const sidebar = document.getElementById('sidebar');
    let lastQuery = ""; // Bot Memory

    const uid = localStorage.getItem('veda_uid') || "V-" + Math.random().toString(36).slice(2,7).toUpperCase();
    localStorage.setItem('veda_uid', uid);
    document.getElementById('uid').innerText = "ID: " + uid;

    if(localStorage.getItem('mode') === 'light') document.body.classList.add('light-mode');
    function toggleMenu() { sidebar.classList.toggle('active'); }

    document.getElementById('theme-toggle').onclick = () => {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('mode', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        toggleMenu();
    };

    // --- MAIN BOT LOGIC ---
    async function getBotReply(msg) {
        let q = msg.toLowerCase().trim();

        // 1. FAST CHAT SECTION (Greetings & Slangs)
        const fastChat = {
            "hi": "Namaste! Main Veda AI hoon. Kaise madad karun?",
            "hello": "Hello! Swagat hai aapka Veda AI mein.",
            "hlo": "Hello! Swagat hai aapka Veda AI mein.",
            "hey": "Hey! Kya haal hain?",
            "kaise ho": "Main bilkul badhiya! Aap kaise hain?",
            "radhe radhe": "Radhe Radhe! 💗",
            "ok": "Theek hai!",
            "hmm": "Hmm... main sun raha hoon.",
            "bye": "Alvida! Apna khayal rakhein.",
            "bc": "Izzat se baat karein! Badtameezi bardasht nahi ki jayegi.",
            "mc": "Kripya sabhya bhasha ka upyog karein.",
            "sale": "Bhasha par dhyan dein, main ek AI assistant hoon.",
            "depression": "Agar aap pareshan hain, toh kripya kisi doctor ya apne kisi pyare se baat karein.",
            "alya": "Alya sometimes hides her feelings in Russian! 😊"
        };
        if (fastChat[q]) { lastQuery = ""; return fastChat[q]; }

        // 2. LIVE DATA (Time/Date)
        if(q.includes("time")) return "Abhi " + new Date().toLocaleTimeString('hi-IN');
        if(q.includes("date")) return "Aaj " + new Date().toLocaleDateString('hi-IN');

        // 3. OFFLINE DATABASE (responses.js)
        if (typeof vedaDatabase !== 'undefined' && vedaDatabase !== null) {
            let match = null; let maxL = 0;
            for (let k in vedaDatabase) {
                let lowerK = k.toLowerCase().trim();
                if (q.includes(lowerK) && lowerK.length > maxL) {
                    maxL = lowerK.length; match = vedaDatabase[k];
                }
            }
            if (match) { lastQuery = ""; return match; }
        }

        // 4. ONLINE SEARCH (Wikipedia & DDG)
        let topic = q.replace(/kya hai|batao|kaun hai|define/g, "").trim();
        if(topic.length > 2) {
            try {
                let r = await fetch(`https://hi.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(topic)}`);
                let d = await r.json();
                if (d.extract) { lastQuery = ""; return d.extract; }
                
                let ddg = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(topic)}&format=json&no_html=1`);
                let ddgd = await ddg.json();
                if (ddgd.AbstractText) { lastQuery = ""; return ddgd.AbstractText; }
            } catch(e) {}
        }

        // 5. SMART FALLBACK (Memory Logic)
        if (q === lastQuery) {
            let gLink = `https://www.google.com/search?q=${encodeURIComponent(q)}`;
            lastQuery = ""; 
            return `Mujhe abhi bhi sateek jawab nahi mila. Aap yahan click karke Google par dekh sakte hain: <br><br> <a href="${gLink}" target="_blank" style="color:var(--primary); font-weight:bold; text-decoration:none;">🔍 Search on Google</a>`;
        } else {
            lastQuery = q; 
            return "Maaf kijiye, mujhe is baare mein jaankari nahi mili. Kya aap thoda vistaar (detail) mein pooch sakte hain?";
        }
    }

    // --- UI FUNCTIONS ---
    function addMessage(text, sender) {
        const wrap = document.createElement('div');
        wrap.className = `msg ${sender}`;
        let tools = sender === 'bot' ? `<div class="msg-tools"><span class="tool-icon" onclick="readOut(\`${text.replace(/[`'"]/g, "")}\`)">🔊</span><span class="tool-icon" onclick="navigator.clipboard.writeText(\`${text}\`)">📋</span></div>` : '';
        wrap.innerHTML = `<div class="bubble">${text}</div>${tools}`;
        chatBox.appendChild(wrap);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if(!text) return;
        addMessage(text, 'user');
        userInput.value = "";
        loader.style.display = "block";
        const reply = await getBotReply(text);
        loader.style.display = "none";
        setTimeout(() => addMessage(reply, 'bot'), 200);
    }

    function readOut(t) {
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(t); u.lang = 'hi-IN';
        window.speechSynthesis.speak(u);
    }

    function saveChat() {
        let log = "VEDA CHAT LOG\n\n";
        document.querySelectorAll('.bubble').forEach(b => log += (b.parentElement.classList.contains('user') ? "U: " : "V: ") + b.innerText + "\n\n");
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([log])); a.download="VedaChat.txt"; a.click();
    }

    function clearChat() { if(confirm("Clear chat?")) { chatBox.innerHTML = ""; addMessage("Chat reset. Namaste!", "bot"); } }

    async function sendFeedback() {
        let fb = prompt("Veda AI ke liye feedback likhein:");
        if (fb && fb.trim() !== "") {
            try {
                await fetch("https://formspree.io/f/xwvrzgvj", {
                    method: 'POST',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ User: uid, Message: fb })
                });
                alert("Feedback sent!"); toggleMenu();
            } catch (e) { alert("Error."); }
        }
    }

    document.getElementById('send-btn').onclick = handleSend;
    userInput.onkeydown = (e) => { if(e.key === "Enter") handleSend(); };
    window.onload = () => addMessage("Namaste! Main Veda AI hoon. Main aapki kaise madad kar sakta hoon?", "bot");
</script>
</body>
</html>
