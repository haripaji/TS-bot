<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veda AI</title>
    
    <script src="core.js"></script>
    <script src="responses.js"></script> 
    <script src="about.js"></script>
    <script src="amine.js"></script>

    
    <style>
        :root { 
            --primary: #10a37f; --bg: #343541; --sidebar: #202123; --text: #ececf1; 
            --border: rgba(255,255,255,0.1); --card: #444654; --advance-neon: #00ffcc; 
        }
        .light-mode { --bg: #ffffff; --text: #202123; --sidebar: #f9f9f9; --card: #e5e5e5; --border: rgba(0,0,0,0.1); }
        
        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }

        /* Login Screen */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .login-card { background: var(--sidebar); padding: 40px; border-radius: 24px; text-align: center; border: 1px solid var(--border); width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }

        header { height: 65px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; background: var(--bg); }
        .title { font-weight: 800; font-size: 1.4rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 24px; }
        .msg-container { display: flex; gap: 15px; max-width: 85%; animation: slideUp 0.4s ease forwards; }
        .user { align-self: flex-end; flex-direction: row-reverse; }
        .bot { align-self: flex-start; }
        
        .bubble { padding: 14px 18px; border-radius: 18px; font-size: 15.5px; line-height: 1.6; }
        .user .bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .bot .bubble { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        
        .wiki-img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }

        /* Sidebar & Popups */
        #settings-menu { position: fixed; right: -100%; top: 0; width: 300px; height: 100%; background: var(--sidebar); z-index: 2000; padding: 30px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid var(--border); }
        #settings-menu.open { right: 0; }
        
        #category-popup { display: none; position: fixed; bottom: 90px; left: 20px; background: var(--sidebar); border: 1px solid var(--border); border-radius: 20px; padding: 20px; width: 260px; z-index: 1000; box-shadow: 0 15px 45px rgba(0,0,0,0.5); }
        
        .menu-btn { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 12px; text-align: left; margin-bottom: 10px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .menu-btn:hover { background: var(--primary); color: white; }

        .footer { padding: 20px; background: var(--bg); }
        .input-container { max-width: 900px; margin: 0 auto; background: var(--card); border-radius: 20px; display: flex; align-items: center; padding: 10px 20px; border: 1px solid var(--border); transition: 0.3s; }
        .input-container:focus-within { border-color: var(--primary); box-shadow: 0 0 15px rgba(16, 163, 127, 0.2); }
        input { flex: 1; background: none; border: none; color: var(--text); outline: none; font-size: 16px; padding: 10px 0; }

        .btn-icon { background: none; border: none; color: #8e8ea0; font-size: 22px; cursor: pointer; padding: 5px; transition: 0.2s; }
        .btn-icon:hover { color: var(--primary); transform: scale(1.1); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onclick="closeAll()">

<div id="login-overlay">
    <div class="login-card">
        <h1 style="color:var(--primary); margin-bottom:10px;">Veda AI</h1>
        <p style="font-size:14px; opacity:0.7; margin-bottom:20px;">Created by Thoughts Sounds</p>
        <input type="text" id="user-name-in" placeholder="Enter your name..." style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); background:rgba(255,255,255,0.05); color:white; margin-bottom:20px; text-align:center; font-size:16px;">
        <button onclick="doLogin()" style="width:100%; padding:15px; background:var(--primary); border:none; color:white; border-radius:12px; font-weight:bold; cursor:pointer; font-size:16px;">Create Account / Login</button>
    </div>
</div>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <button class="btn-icon" onclick="event.stopPropagation(); toggleMenu(true)">☰</button>
        <div class="title" id="veda-title">VEDA AI</div>
    </div>
    <div id="header-user" style="font-size:11px; text-align:right; opacity:0.6;">Welcome<br>Guest</div>
</header>

<div id="chat-box"></div>

<div id="category-popup" onclick="event.stopPropagation()">
    <p style="font-size: 11px; opacity:0.5; margin-bottom: 15px; font-weight:bold;">AI ENGINE MODES</p>
    <button class="menu-btn" onclick="setMode('Auto')">✨ Smart Auto</button>
    <button class="menu-btn" onclick="setMode('Wikipedia')">🌐 Web Research</button>
    <button class="menu-btn" onclick="setMode('Study')">📚 Academic</button>
    <hr style="border:0; border-top:1px solid var(--border); margin: 15px 0;">
    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--advance-neon); font-weight: bold;">
        <input type="checkbox" id="advanceModeToggle" onchange="toggleAdvanceTheme()" style="accent-color: var(--advance-neon);">
        🚀 VEDA PRO (LLM)
    </label>
</div>

<div id="settings-menu" onclick="event.stopPropagation()">
    <button class="menu-btn" style="background:var(--primary); font-weight:bold; margin-bottom:25px;">👤 User Profile</button>
    <h4 style="margin-bottom:15px; opacity:0.8;">Preferences</h4>
    <button class="menu-btn" onclick="toggleLightMode()">🌓 Change Theme</button>
    <button class="menu-btn" onclick="toggleVoice()">🔊 Voice Response: <span id="voice-status">OFF</span></button>
    <button class="menu-btn" onclick="downloadChat()">📥 Save Conversation</button>
    <button class="menu-btn" onclick="clearBrain()" style="color:#ff4d4d; margin-top:30px;">🗑️ Delete All Data</button>
</div>

<div class="footer">
    <div class="input-container">
        <button class="btn-icon" onclick="event.stopPropagation(); toggleCategory()">➕</button>
        <input type="text" id="user-in" placeholder="Message Veda AI..." autocomplete="off">
        <button class="btn-icon" onclick="handleSend()" style="color:var(--primary)">⬆️</button>
    </div>
</div>

<script>
    let vedaMemory = JSON.parse(localStorage.getItem('vedaMemory')) || {};
    let chatHistory = JSON.parse(localStorage.getItem('vedaChatHistory')) || [];
    let currentMode = "Auto";
    let isVoiceEnabled = false;
    let userName = localStorage.getItem('vedaUserName') || "User";

    const VERCEL_URL = "https://veda-brain-q1ju.vercel.app/ask";

    window.onload = () => {
        if(localStorage.getItem('vedaUserName')) {
            document.getElementById('login-overlay').style.display = 'none';
            loadHistory();
            updateUI();
        }
    };

    function doLogin() {
        const name = document.getElementById('user-name-in').value.trim();
        if(!name) return alert("Please enter your name");
        userName = name;
        localStorage.setItem('vedaUserName', name);
        document.getElementById('login-overlay').style.display = 'none';
        updateUI();
        addMessage(`Hello **${userName}**! I am Veda AI. How can I assist you today?`, "bot");
    }

    async function processLogic(q) {
        const query = q.toLowerCase().trim();
        const isAdv = document.getElementById('advanceModeToggle').checked;

        // 1. Wikipedia Logic with Images
        if (currentMode === "Wikipedia" || query.startsWith("who is") || query.startsWith("what is")) {
            const wikiData = await fetchWiki(query.replace("who is ", "").replace("what is ", ""));
            if (wikiData) {
                let html = wikiData.img ? `<img src="${wikiData.img}" class="wiki-img">` : "";
                return html + wikiData.text;
            }
        }

        // 2. Pro Mode (LLM)
        if (isAdv) {
            try {
                const res = await fetch(VERCEL_URL, {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({ query: q, user: userName, history: chatHistory.slice(-5) })
                });
                const data = await res.json();
                return data.reply;
            } catch(e) { return "I'm having trouble connecting to my brain server. Let's try Local Mode."; }
        }

        // 3. Local Knowledge & Learning
        const localDB = { ...window.vedaCore, ...vedaMemory };
        if (localDB[query]) return localDB[query];

        return "I'm still learning about that. Can you explain what you mean? (I'll remember it for next time)";
    }

    async function fetchWiki(query) {
        try {
            const res = await fetch(`https://hi.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
            const data = await res.json();
            if (data.title && data.extract) {
                return {
                    text: data.extract,
                    img: data.thumbnail ? data.thumbnail.source : null
                };
            }
            return null;
        } catch(e) { return null; }
    }

    async function handleSend() {
        const inp = document.getElementById('user-in');
        const val = inp.value.trim();
        if(!val) return;

        addMessage(val, 'user');
        chatHistory.push({ role: 'user', text: val });
        inp.value = "";
        
        const tId = "think-" + Date.now();
        addMessage("Veda is processing...", "bot", tId);
        
        const reply = await processLogic(val);
        chatHistory.push({ role: 'bot', text: reply });
        localStorage.setItem('vedaChatHistory', JSON.stringify(chatHistory));

        const botMsgDiv = document.getElementById(tId).querySelector('.bubble');
        botMsgDiv.innerHTML = reply;
        
        if(isVoiceEnabled) speak(reply.replace(/<[^>]*>?/gm, '')); // Strip HTML for TTS
    }

    function addMessage(txt, sender, id = null) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg-container ${sender}`;
        if(id) div.id = id;
        div.innerHTML = `<div class="bubble">${txt}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function loadHistory() {
        chatHistory.forEach(msg => addMessage(msg.text, msg.role));
    }

    function speak(text) {
        const synth = window.speechSynthesis;
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'hi-IN';
        synth.speak(utter);
    }

    function toggleVoice() {
        isVoiceEnabled = !isVoiceEnabled;
        document.getElementById('voice-status').innerText = isVoiceEnabled ? "ON" : "OFF";
    }

    function toggleMenu(s) { document.getElementById('settings-menu').classList.toggle('open', s); }
    function toggleCategory() {
        const p = document.getElementById('category-popup');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }
    function closeAll() { 
        document.getElementById('category-popup').style.display = 'none'; 
        toggleMenu(false); 
    }
    function setMode(m) { currentMode = m; toggleCategory(); addMessage(`Switched to **${m}** mode.`, "bot"); }
    function updateUI() { document.getElementById('header-user').innerHTML = `${userName}<br>ID: VEDA-${Math.floor(1000+Math.random()*9000)}`; }
    function toggleLightMode() { document.body.classList.toggle('light-mode'); }
    function clearBrain() { if(confirm("Delete all data?")) { localStorage.clear(); location.reload(); } }
    
    function downloadChat() {
        const blob = new Blob([JSON.stringify(chatHistory, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `VedaChat_${userName}.json`;
        a.click();
    }

    document.getElementById('user-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    function toggleAdvanceTheme() {
        const isAdv = document.getElementById('advanceModeToggle').checked;
        document.getElementById('veda-title').innerText = isAdv ? "VEDA PRO" : "VEDA AI";
        document.body.style.setProperty('--primary', isAdv ? '#00ffcc' : '#10a37f');
    }
</script>
</body>
</html>
