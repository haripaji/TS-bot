<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veda AI - Gemini Edition</title>
    <style>
        :root { 
            --primary: #7c3aed; 
            --bg: #0b1120; 
            --card: #1e293b; 
            --text: #f1f5f9; 
            --secondary: #94a3b8; 
            /* Mobile safe areas handling */
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* FIX: Using dvh (dynamic viewport height) for full screen on mobile */
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100dvh; /* Dynamic Height for dynamic UI */
            display: flex; 
            overflow: hidden; 
            padding-bottom: var(--safe-bottom); /* Safe area bottom spacing */
        }

        /* --- 1. SIDEBAR / DRAWER (Existing - Good) --- */
        #sidebar { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: #0f172a; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; padding: 20px; box-shadow: 15px 0 50px rgba(0,0,0,0.5); }
        #sidebar.active { left: 0; }
        .drawer-header { display: flex; align-items: center; margin-bottom: 30px; }
        .back-btn { font-size: 24px; cursor: pointer; color: var(--primary); margin-right: 15px; }
        .side-item { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        /* --- 2. MAIN CHAT AREA (Adjusted) --- */
        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            height: 100%; 
        }
        
        header { 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            background: rgba(11, 17, 32, 0.8); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            z-index: 10;
        }
        .menu-icon { font-size: 24px; cursor: pointer; color: var(--primary); margin-right: 15px; }
        .logo { flex: 1; font-weight: 700; letter-spacing: 1px; color: var(--primary); font-size: 1.1rem; }

        /* Adjusted padding to avoid overlap with floating input */
        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            padding-bottom: 110px; /* Space for the floating input and footer */
            scroll-behavior: smooth;
        }
        
        /* Message Bubbles (Existing - Good) */
        .msg-wrapper { max-width: 85%; display: flex; flex-direction: column; }
        .user-wrapper { align-self: flex-end; }
        .bot-wrapper { align-self: flex-start; }

        .bubble { padding: 14px 18px; border-radius: 20px; font-size: 16px; line-height: 1.5; position: relative; word-wrap: break-word; }
        .user-bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(124, 58, 237, 0.15); }
        .bot-bubble { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-bottom-left-radius: 4px; }

        /* Gemini Style Action Icons (Existing - Good) */
        .actions { display: flex; gap: 15px; margin-top: 8px; padding-left: 5px; opacity: 0.6; }
        .action-icon { font-size: 14px; cursor: pointer; transition: 0.2s; }
        .action-icon:hover { opacity: 1; color: var(--primary); }

        /* --- 3. FIX: FLOATING INPUT & FOOTER POSITIONING --- */
        .bottom-section { 
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            padding: 10px 20px 10px 20px; /* Normal padding for the sections */
            background: linear-gradient(transparent, var(--bg) 20%); /* Smoother gradient */
            z-index: 5;
            pointer-events: none; /* Let clicks pass through the padding area to the input wrapper */
        }
        
        /* Only the wrapper should capture pointer events */
        .bottom-section > * { pointer-events: auto; }

        .input-wrapper { 
            background: #2d3748; 
            border-radius: 30px; 
            display: flex; 
            align-items: center; 
            padding: 6px 15px; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); 
            transition: border-color 0.2s;
        }
        
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px 10px; font-size: 16px; outline: none; }
        .btn-icon { background: none; border: none; color: var(--secondary); font-size: 20px; cursor: pointer; padding: 8px; }
        #send-btn { color: var(--primary); font-size: 22px; }

        .footer-branding { 
            text-align: center; 
            font-size: 11px; 
            color: var(--secondary); 
            margin-top: 10px; 
            opacity: 0.7; 
            letter-spacing: 0.5px; 
            margin-bottom: 2px; /* Small gap above safe area/screen edge */
        }

        /* Typing Indicator (Existing - Good) */
        .typing { font-size: 12px; color: var(--primary); margin-left: 20px; display: none; margin-bottom: 10px; z-index: 5;}
    </style>
</head>
<body>

<nav id="sidebar">
    <div class="drawer-header">
        <span class="back-btn" onclick="toggleMenu()">←</span>
        <h2 style="margin:0; font-size: 20px;">Settings</h2>
    </div>
    <button class="side-item">💾 Save Chat</button>
    <button class="side-item">🔄 Reset Conversation</button>
    <button class="side-item">📧 Feedback</button>
</nav>

<main>
    <header>
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <div class="logo">VEDA AI</div>
        <div style="font-size: 10px; opacity: 0.5;">v2.0</div>
    </header>

    <div id="chat-container">
        <div class="msg-wrapper bot-wrapper">
            <div class="bubble bot-bubble">Namaste! Main Veda AI hoon. Aaj hum kis baare mein baat karein?</div>
            <div class="actions">
                <span class="action-icon" title="Like">👍</span>
                <span class="action-icon" title="Dislike">👎</span>
                <span class="action-icon" title="Copy">📋</span>
                <span class="action-icon" title="Redo">🔄</span>
                <span class="action-icon" title="More">⋮</span>
            </div>
        </div>
    </div>

    <div class="typing" id="status" style="position: absolute; bottom: 95px;">Veda is searching internet...</div>

    <div class="bottom-section">
        <div class="input-wrapper">
            <button class="btn-icon">🎤</button>
            <input type="text" id="user-input" placeholder="Ask anything..." autocomplete="off">
            <button class="btn-icon" id="send-btn">➤</button>
        </div>
        <div class="footer-branding">Created by thoughts sounds</div>
    </div>
</main>

<script>
    const sidebar = document.getElementById('sidebar');
    const inputField = document.getElementById('user-input');

    function toggleMenu() {
        sidebar.classList.toggle('active');
    }

    // Input focus styling
    inputField.addEventListener('focus', () => {
        document.querySelector('.input-wrapper').style.borderColor = 'var(--primary)';
    });
    inputField.addEventListener('blur', () => {
        document.querySelector('.input-wrapper').style.borderColor = 'rgba(255,255,255,0.1)';
    });
    
    // Simple demo for send button (actual logic to be added later)
    document.getElementById('send-btn').addEventListener('click', () => {
        if(inputField.value.trim() !== "") {
            // Here you'll add message processing logic
            inputField.value = "";
        }
    });
<script>
    const chatContainer = document.getElementById('chat-container');
    const inputField = document.getElementById('user-input');
    const statusLabel = document.getElementById('status');
    const sidebar = document.getElementById('sidebar');

    function toggleMenu() { sidebar.classList.toggle('active'); }

    // --- 1. WIKIPEDIA API (With 5s Timeout) ---
    async function fetchOnline(query) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        try {
            const url = `https://hi.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
            const response = await fetch(url, { signal: controller.signal });
            const data = await response.json();
            clearTimeout(timeoutId);
            return data.extract || null;
        } catch (e) { return null; }
    }

    // --- 2. RESPONSES.JS HANDLER (Dynamic) ---
    function checkDatabase(text) {
        text = text.toLowerCase().trim();
        if (typeof vedaDatabase !== 'undefined') {
            for (let key in vedaDatabase) {
                if (text.includes(key.toLowerCase())) return vedaDatabase[key];
            }
        }
        return null;
    }

    // --- 3. UI UTILITIES (Copy, Redo, Like) ---
    function copyText(btn, text) {
        navigator.clipboard.writeText(text);
        btn.innerText = "✅";
        setTimeout(() => btn.innerText = "📋", 2000);
    }

    function redoTask(text) {
        inputField.value = text;
        processMessage();
    }

    // --- 4. MESSAGE GENERATOR ---
    function addMsg(text, type, rawInput = "") {
        const wrapper = document.createElement("div");
        wrapper.className = `msg-wrapper ${type}-wrapper`;
        
        const actionsHTML = type === 'bot' ? `
            <div class="actions">
                <span class="action-icon" onclick="this.style.color='#22c55e'">👍</span>
                <span class="action-icon" onclick="this.style.color='#ef4444'">👎</span>
                <span class="action-icon" onclick="copyText(this, \`${text.replace(/'/g, "\\'")}\`)">📋</span>
                <span class="action-icon" onclick="redoTask(\`${rawInput}\`)">🔄</span>
            </div>` : '';

        wrapper.innerHTML = `
            <div class="bubble ${type}-bubble">${text}</div>
            ${actionsHTML}
        `;
        
        chatContainer.appendChild(wrapper);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        if (type === "bot") {
            const speech = new SpeechSynthesisUtterance(text.replace(/<[^>]*>?/gm, ''));
            speech.lang = 'hi-IN';
            window.speechSynthesis.speak(speech);
        }
    }

    // --- 5. MAIN PROCESSOR ---
    async function processMessage() {
        const val = inputField.value.trim();
        if(!val) return;

        addMsg(val, "user");
        inputField.value = "";
        statusLabel.style.display = "block"; // Show "Thinking..."

        let reply = null;

        // Step 1: Try Online (Wiki)
        reply = await fetchOnline(val);

        // Step 2: Try responses.js
        if (!reply) {
            reply = checkDatabase(val);
        }

        // Step 3: Default & Email Report
        if (!reply) {
            reply = (typeof defaultResponse !== 'undefined') ? defaultResponse : "Maaf kijiye, mujhe iska jawab nahi mila.";
            
            // Background Email trigger
            const admin = "harendrashrivastav44@gmail.com";
            setTimeout(() => {
                window.location.href = `mailto:${admin}?subject=Unknown Question&body=User:VedaID%0AQ:${val}`;
            }, 3000);
        }

        statusLabel.style.display = "none";
        setTimeout(() => addMsg(reply, "bot", val), 500);
    }

    // Events
    document.getElementById('send-btn').onclick = processMessage;
    inputField.onkeypress = (e) => { if(e.key === "Enter") processMessage(); };

    // Placeholder for Mic
    document.querySelector('.btn-icon').onclick = () => {
        const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Rec) {
            const r = new Rec(); r.lang = "hi-IN";
            r.onstart = () => statusLabel.style.display = "block";
            r.onresult = (e) => { inputField.value = e.results[0][0].transcript; processMessage(); };
            r.onend = () => statusLabel.style.display = "none";
            r.start();
        }
    };
</script>


</body>
</html>
