<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veda AI Pro | Ultimate Assistant</title>
    
    <style>
        :root { 
            --bg: #131314; --sidebar-bg: #1e1f20; --primary: #8ab4f8; 
            --text: #e3e3e3; --border: #444746; --user-msg: #2b2c2d; --card: #1e1f20;
        }
        * { box-sizing: border-box; font-family: 'Google Sans', 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- Auth Screen --- */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 99999; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .auth-card { text-align: center; width: 90%; max-width: 380px; }
        .auth-card h1 { font-size: 3rem; font-weight: 400; margin-bottom: 40px; background: linear-gradient(to right, #4285f4, #8ab4f8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-input { width: 100%; padding: 16px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 15px; outline: none; font-size: 16px; }
        .auth-input:focus { border-color: var(--primary); }
        .login-btn { width: 100%; padding: 14px; background: var(--primary); color: #000; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        #loading-ui { margin-top: 20px; display: none; color: var(--primary); font-size: 14px; letter-spacing: 1px; }

        /* --- Sidebar & Overlay --- */
        #overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10000; display: none; }
        #sidebar { position: fixed; left: -280px; top: 0; bottom: 0; width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); z-index: 10001; transition: left 0.3s ease; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        #sidebar.active { left: 0; }
        .new-chat-btn { padding: 12px; background: transparent; border: 1px dashed var(--border); color: white; border-radius: 8px; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .new-chat-btn:hover { background: rgba(255,255,255,0.05); }
        .history-item { padding: 12px; border-radius: 8px; border: 1px solid transparent; font-size: 14px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #9aa0a6; transition: 0.2s; }
        .history-item:hover { background: rgba(255,255,255,0.05); color: white; border-color: var(--border); }

        /* --- Header --- */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg); z-index: 10; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .menu-btn { background: none; border: none; color: white; cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; }
        .logo { font-size: 22px; font-weight: 500; }
        .user-av { width: 34px; height: 34px; background: #3c4043; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); font-size: 14px; }

        /* --- Chat Area --- */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 30px; scroll-behavior: smooth; }
        .row { max-width: 800px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; position: relative; animation: fadeIn 0.3s ease; }
        .msg { line-height: 1.6; font-size: 16px; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: var(--user-msg); padding: 12px 20px; border-radius: 22px; max-width: 85%; cursor: pointer; border-bottom-right-radius: 4px; }
        .bot-msg { align-self: flex-start; max-width: 90%; }

        /* --- Context Menu (Hold to Edit) --- */
        #context-menu { position: fixed; display: none; background: #2d2e30; border: 1px solid var(--border); border-radius: 8px; z-index: 100000; box-shadow: 0 8px 24px rgba(0,0,0,0.5); overflow: hidden; min-width: 160px; }
        .menu-opt { padding: 12px 20px; cursor: pointer; font-size: 14px; color: white; }
        .menu-opt:hover { background: #3c4043; }

        /* --- Response Toolkit --- */
        .toolkit { display: flex; gap: 12px; margin-top: 5px; opacity: 0.7; transition: 0.3s; }
        .toolkit:hover { opacity: 1; }
        .tool-icon { background: none; border: none; cursor: pointer; color: #9aa0a6; padding: 6px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .tool-icon:hover { background: rgba(255,255,255,0.1); color: white; }
        .tool-icon svg { width: 18px; height: 18px; fill: currentColor; }

        /* --- Embedded Search Card --- */
        .search-container { width: 100%; border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-top: 10px; background: #000; }
        iframe { width: 100%; height: 400px; border: none; background: white; }

        /* --- Footer Input --- */
        .footer { padding: 10px 20px 25px; max-width: 850px; margin: 0 auto; width: 100%; background: var(--bg); }
        .input-bar { background: var(--card); border-radius: 30px; display: flex; align-items: center; padding: 8px 15px; border: 1px solid transparent; transition: 0.3s; }
        .input-bar:focus-within { background: #282a2c; border-color: var(--border); }
        textarea { flex: 1; background: none; border: none; color: white; outline: none; resize: none; font-size: 16px; margin: 0 10px; max-height: 150px; padding: 10px 0; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<!-- Sign-in Screen -->
<div id="auth-screen">
    <div class="auth-card">
        <h1>Veda</h1>
        <input type="text" id="login-name" class="auth-input" placeholder="Enter your name">
        <button class="login-btn" onclick="initLogin()">Sign in</button>
        <div id="loading-ui">SYNCING CLOUD...</div>
    </div>
</div>

<!-- Sidebar Layout -->
<div id="overlay-bg" onclick="toggleSidebar()"></div>
<div id="sidebar">
    <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
    <div style="font-size:12px; color:#9aa0a6; font-weight:600; letter-spacing:1px; margin-top:10px;">RECENT CHATS</div>
    <div id="history-list" style="overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:5px;"></div>
    <button class="new-chat-btn" style="border:none; color:#f28b82; background:rgba(242, 139, 130, 0.1);" onclick="clearHistory()">🗑️ Clear History</button>
</div>

<!-- Main App UI -->
<header>
    <div class="logo-area">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="logo">Veda <span style="color:var(--primary)">Pro</span></div>
    </div>
    <div class="user-av" id="header-av">U</div>
</header>

<div id="chat-box"></div>

<!-- Custom Context Menu for Hold-to-Edit -->
<div id="context-menu">
    <div class="menu-opt" onclick="copyUserMsg()">📋 Copy Text</div>
    <div class="menu-opt" onclick="editUserMsg()">✏️ Edit Message</div>
</div>

<div class="footer">
    <div class="input-bar">
        <button onclick="startVoiceInput()" class="tool-icon" title="Voice Typing">🎙️</button>
        <textarea id="user-input" placeholder="Ask Veda..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button onclick="handleSend()" class="tool-icon" style="color:var(--primary);">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<!-- Load Database Scripts (Ensure these files exist in the folder) -->
<script src="core.js"></script>
<script src="study.js"></script>
<script src="anime.js"></script>
<script src="responses.js"></script>

<script>
    // --- Global Variables ---
    let user = JSON.parse(localStorage.getItem('vedaUser')) || null;
    let chatSessions = JSON.parse(localStorage.getItem('vedaChatHistory')) || [];
    let currentSessionId = null;
    let selectedMsgRef = null;
    let holdTimer;

    // --- Initialization & Auth ---
    window.onload = () => {
        if(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('header-av').innerText = user.name[0].toUpperCase();
            initChatSystem();
        }
    };

    function initLogin() {
        const name = document.getElementById('login-name').value.trim();
        if(!name) return alert("Please enter your name to continue.");
        
        const loader = document.getElementById('loading-ui');
        loader.style.display = "block";
        
        setTimeout(() => {
            user = { name: name };
            localStorage.setItem('vedaUser', JSON.stringify(user));
            document.getElementById('auth-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('header-av').innerText = name[0].toUpperCase();
                initChatSystem();
            }, 500);
        }, 1500);
    }

    // --- History & Sidebar System ---
    function initChatSystem() {
        renderHistory();
        if(chatSessions.length > 0) {
            loadSession(chatSessions[0].id);
        } else {
            startNewChat();
        }
    }

    function toggleSidebar() {
        const side = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay-bg');
        side.classList.toggle('active');
        overlay.style.display = side.classList.contains('active') ? 'block' : 'none';
    }

    function startNewChat() {
        document.getElementById('chat-box').innerHTML = `
            <div class="row bot-msg">
                <div class="msg">Namaste ${user.name}! Main Veda AI hoon. Aaj hum kya seekhein ya banayein?</div>
            </div>`;
        currentSessionId = Date.now();
        saveSession();
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('overlay-bg').style.display = 'none';
    }

    function saveSession() {
        if(!currentSessionId) return;
        const chatHtml = document.getElementById('chat-box').innerHTML;
        const userMsgs = document.querySelectorAll('.user-msg .msg');
        let title = "New Conversation";
        if(userMsgs.length > 0) {
            title = userMsgs[0].innerText.substring(0, 25) + "...";
        }
        
        const existingIndex = chatSessions.findIndex(s => s.id === currentSessionId);
        if(existingIndex > -1) {
            chatSessions[existingIndex].content = chatHtml;
            chatSessions[existingIndex].title = title;
        } else {
            chatSessions.unshift({ id: currentSessionId, title: title, content: chatHtml });
        }
        
        if(chatSessions.length > 20) chatSessions.pop(); // Keep max 20 chats
        localStorage.setItem('vedaChatHistory', JSON.stringify(chatSessions));
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        chatSessions.forEach(session => {
            const div = document.createElement('div');
            div.className = "history-item";
            div.innerText = session.title;
            div.onclick = () => { loadSession(session.id); toggleSidebar(); };
            list.appendChild(div);
        });
    }

    function loadSession(id) {
        const session = chatSessions.find(s => s.id === id);
        if(session) {
            document.getElementById('chat-box').innerHTML = session.content;
            currentSessionId = session.id;
            rebindUserMessages();
        }
    }

    function clearHistory() {
        if(confirm("Are you sure you want to delete all chat history?")) {
            localStorage.removeItem('vedaChatHistory');
            chatSessions = [];
            startNewChat();
        }
    }

    // --- Message Processing & Logic ---
    async function handleSend() {
        const input = document.getElementById('user-input');
        const val = input.value.trim();
        if(!val) return;

        createMsg(val, 'user');
        input.value = "";
        input.style.height = "auto";
        saveSession();

        // Simulate thinking delay
        setTimeout(async () => {
            const response = await findAnswer(val.toLowerCase());
            createMsg(response, 'bot');
            saveSession();
        }, 600);
    }

    async function findAnswer(q) {
        // Strict Hierarchy: 1. Local Files Database
        const db = {...(window.vedaCore || {}), ...(window.vedaStudy || {}), ...(window.vedaAnime || {}), ...(window.vedaResponses || {})};
        
        // Exact Match
        if(db[q]) return db[q];

        // Partial Keyword Match
        for (let key in db) {
            if(q.includes(key)) return db[key];
        }

        // 2. Wikipedia/Internet Fallback (Ask Permission)
        return `Mujhe apne local database mein iska exact match nahi mila. Kya main is baare mein internet par dhoondun?<br><br><button class="new-chat-btn" style="border:1px solid var(--primary); color:var(--primary);" onclick="triggerGoogle('${q}')">🔍 Search Web</button>`;
    }

    function triggerGoogle(q) {
        const chat = document.getElementById('chat-box');
        const card = document.createElement('div');
        card.className = "row bot-msg";
        card.innerHTML = `
            <div class="msg" style="font-size:13px; color:#9aa0a6;">Live results for: "${q}"</div>
            <div class="search-container">
                <iframe src="https://www.bing.com/search?q=${encodeURIComponent(q)}"></iframe>
            </div>
        `;
        chat.appendChild(card);
        chat.scrollTop = chat.scrollHeight;
        saveSession();
    }

    // --- Message UI Creation ---
    function createMsg(text, type) {
        const chat = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `row ${type === 'user' ? 'user-msg' : 'bot-msg'}`;
        
        let content = `<div class="msg">${text}</div>`;
        
        if(type === 'bot' && !text.includes('iframe')) {
            const cleanText = text.replace(/(<([^>]+)>)/gi, "").replace(/'/g, "\\'"); // Clean HTML for TTS
            content += `
                <div class="toolkit">
                    <button class="tool-icon" onclick="speak('${cleanText}')" title="Listen">🔊</button>
                    <button class="tool-icon" onclick="copyText('${cleanText}')" title="Copy">📋</button>
                    <button class="tool-icon" onclick="this.style.color='#8ab4f8'">👍</button>
                    <button class="tool-icon" onclick="triggerGoogle('${cleanText.substring(0,25)}')">👎</button>
                </div>
            `;
        }

        div.innerHTML = content;
        
        if(type === 'user') bindHoldEvent(div);

        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    // --- Hold-to-Edit System ---
    function bindHoldEvent(el) {
        el.addEventListener('mousedown', (e) => startHold(e, el));
        el.addEventListener('touchstart', (e) => startHold(e, el), {passive: false});
        el.addEventListener('mouseup', endHold);
        el.addEventListener('touchend', endHold);
    }
    
    function rebindUserMessages() {
        document.querySelectorAll('.user-msg').forEach(el => bindHoldEvent(el));
    }

    function startHold(e, el) {
        holdTimer = setTimeout(() => {
            selectedMsgRef = el;
            const menu = document.getElementById('context-menu');
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            menu.style.display = 'block';
            menu.style.left = Math.min(x, window.innerWidth - 170) + 'px'; // Prevent off-screen
            menu.style.top = y + 'px';
            if(e.cancelable) e.preventDefault();
        }, 600);
    }
    function endHold() { clearTimeout(holdTimer); }
    document.addEventListener('click', () => document.getElementById('context-menu').style.display='none');

    function copyUserMsg() { 
        copyText(selectedMsgRef.querySelector('.msg').innerText); 
    }
    function editUserMsg() {
        document.getElementById('user-input').value = selectedMsgRef.querySelector('.msg').innerText;
        selectedMsgRef.remove();
        document.getElementById('user-input').focus();
        saveSession();
    }

    // --- Tools (TTS, Copy, Voice Typing) ---
    function speak(txt) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(txt);
        utter.lang = 'hi-IN'; // Hindi/Hinglish accent support
        utter.rate = 1.05;
        window.speechSynthesis.speak(utter);
    }

    function copyText(txt) { 
        navigator.clipboard.writeText(txt); 
        alert("Text Copied!"); 
    }

    function startVoiceInput() {
        const Recog = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!Recog) return alert("Aapka browser Voice Typing support nahi karta.");
        const recognition = new Recog();
        recognition.lang = 'hi-IN';
        recognition.start();
        recognition.onresult = (e) => {
            document.getElementById('user-input').value = e.results[0][0].transcript;
            handleSend();
        };
    }
</script>
</body>
</html>
