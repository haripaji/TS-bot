<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veda AI bot</title>
    
    <script src="core.js"></script>
    <script src="study.js"></script>
    <script src="anime.js"></script>
    <script src="responses.js"></script> 
    <script src="about.js"></script>
    
    <style>
        :root { 
            --primary: #10a37f; --bg: #343541; --sidebar: #202123; 
            --text: #ececf1; --border: rgba(255,255,255,0.1); --card: #444654; 
            --user-msg: #40414f;
        }
        .light-mode { --bg: #f7f7f8; --text: #202123; --sidebar: #ffffff; --card: #e5e5e5; --border: rgba(0,0,0,0.1); --user-msg: #ffffff; }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }

        /* Login Screen */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--sidebar); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid var(--border); width: 90%; max-width: 350px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

        header { width: 100%; height: 55px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; z-index: 100; justify-content: space-between; flex-shrink: 0; }
        .title { font-weight: bold; color: var(--primary); font-size: 1.1rem; }

        /* Sidebar & Menu */
        #settings-menu { position: fixed; top: 0; left: -100%; width: 80%; max-width: 280px; height: 100%; background: var(--sidebar); z-index: 3000; padding: 25px; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        #settings-menu.open { left: 0; }
        #menu-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2500; }

        /* Chat Window */
        #chat-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .row { width: 100%; padding: 20px 15px; display: flex; gap: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); animation: fadeIn 0.3s ease; }
        .row.user { background: var(--bg); }
        .row.bot { background: var(--card); }
        
        .avatar { width: 32px; height: 32px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; color: white; }
        .user .avatar { background: #5436da; }
        .bot .avatar { background: var(--primary); }
        .content { flex: 1; font-size: 15px; line-height: 1.6; word-wrap: break-word; overflow: hidden; }

        /* Actions Bar */
        .actions { display: flex; gap: 12px; margin-top: 10px; opacity: 0.6; }
        .act-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; }

        /* Footer & Input */
        .footer { width: 100%; padding: 10px 15px 30px; background: var(--bg); }
        .input-container { max-width: 800px; margin: 0 auto; background: var(--user-msg); border-radius: 12px; display: flex; align-items: flex-end; padding: 10px; border: 1px solid var(--border); }
        textarea { flex: 1; background: none; border: none; color: var(--text); outline: none; font-size: 16px; resize: none; max-height: 120px; padding: 5px; line-height: 20px; }
        .ui-btn { background: none; border: none; color: #8e8ea0; font-size: 24px; padding: 0 5px; cursor: pointer; }

        /* Popups */
        #category-popup { display: none; position: fixed; bottom: 85px; left: 15px; background: var(--sidebar); border: 1px solid var(--border); border-radius: 15px; padding: 12px; z-index: 1500; width: 220px; }
        .menu-btn { width: 100%; background: rgba(255,255,255,0.05); border: none; color: white; padding: 10px; text-align: left; margin-bottom: 5px; border-radius: 8px; font-size: 14px; cursor: pointer; }

        .ai-media { width: 100%; max-width: 400px; border-radius: 12px; margin: 10px 0; border: 1px solid var(--border); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modern Login Screen with Glassmorphism */
#login-overlay { 
    position: fixed; 
    inset: 0; 
    background: url('https://source.unsplash.com/random/1600x900/?technology,dark') no-repeat center center/cover; 
    z-index: 5000; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    backdrop-filter: blur(10px); /* Background Blur */
}

.login-card { 
    background: rgba(32, 33, 35, 0.8); /* Semi-transparent */
    padding: 40px 30px; 
    border-radius: 24px; 
    text-align: center; 
    border: 1px solid rgba(255, 255, 255, 0.1); 
    width: 90%; 
    max-width: 380px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    backdrop-filter: blur(15px);
    animation: slideUp 0.5s ease;
}

.login-card h2 { 
    font-size: 2rem; 
    background: linear-gradient(to right, #10a37f, #00ffcc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
}

#user-name-in { 
    width: 100%; 
    padding: 15px; 
    border-radius: 12px; 
    border: 1px solid var(--border); 
    background: rgba(255,255,255,0.05); 
    color: white; 
    margin-bottom: 20px; 
    text-align: center; 
    font-size: 16px;
    transition: 0.3s;
}

#user-name-in:focus { 
    border-color: var(--primary); 
    background: rgba(255,255,255,0.1); 
    box-shadow: 0 0 15px rgba(16, 163, 127, 0.3);
}

.login-card button { 
    width: 100%; 
    padding: 15px; 
    background: linear-gradient(45deg, #10a37f, #0dbd8b); 
    border: none; 
    color: white; 
    border-radius: 12px; 
    font-weight: bold; 
    font-size: 16px;
    cursor: pointer; 
    box-shadow: 0 10px 20px rgba(16, 163, 127, 0.2);
    transition: 0.3s;
}

.login-card button:hover { 
    transform: translateY(-2px); 
    box-shadow: 0 15px 25px rgba(16, 163, 127, 0.4); 
}

/* Animations */
@keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* User Bubble Improvement */
.row.user .avatar { background: linear-gradient(45deg, #5436da, #8e44ad); }
.row.bot .avatar { background: linear-gradient(45deg, #10a37f, #1abc9c); box-shadow: 0 0 10px rgba(16, 163, 127, 0.5); }

    </style>
</head>
<body onclick="closeAll()">

<div id="login-overlay">
    <div class="login-card">
        <h2 style="color:var(--primary); margin-bottom:15px;">Veda AI Pro</h2>
        <input type="text" id="user-name-in" placeholder="Aapka Naam..." style="width:100%; padding:14px; border-radius:10px; border:1px solid var(--border); background:#1a1b1e; color:white; margin-bottom:15px; text-align: center; outline: none;">
        <button onclick="doLogin()" style="width:100%; padding:14px; background:var(--primary); border:none; color:white; border-radius:10px; font-weight:bold; cursor:pointer;">Launch Veda</button>
    </div>
</div>

<div id="menu-overlay" onclick="toggleMenu(false)"></div>

<div id="settings-menu" onclick="event.stopPropagation()">
    <h3 style="color:var(--primary); margin-bottom:20px;">Settings</h3>
    <button class="menu-btn" onclick="toggleLightMode()">🌓 Light/Dark Mode</button>
    <button class="menu-btn" onclick="location.reload()">🔄 Reset Conversation</button>
    <button class="menu-btn" onclick="clearBrain()" style="color:#ef4444;">🧠 Wipe Memory</button>
</div>

<header>
    <button class="ui-btn" onclick="event.stopPropagation(); toggleMenu(true)" style="color:var(--text)">☰</button>
    <div class="title" id="veda-title">VEDA AI PRO</div>
    <div id="header-user" style="font-size:10px; color:#8e8ea0; text-align:right;">User<br>VEDA-7777</div>
</header>

<div id="chat-box"></div>

<div id="category-popup" onclick="event.stopPropagation()">
    <button class="menu-btn" onclick="setMode('Auto')">✨ Auto Mode</button>
    <button class="menu-btn" onclick="setMode('Study')">📚 Study Mode</button>
    <button class="menu-btn" onclick="setMode('Anime')">⛩️ Anime Fan</button>
    <button class="menu-btn" onclick="setMode('Image')">🎨 AI Image Mode</button>
    <hr style="opacity:0.1; margin:8px 0;">
    <label style="display: flex; align-items: center; gap: 8px; color: #ff0055; font-size: 12px; cursor: pointer;">
        <input type="checkbox" id="advanceModeToggle" onchange="toggleAdvanceTheme()"> PRO LLM (Vercel)
    </label>
</div>

<div class="footer">
    <div class="input-container">
        <button class="ui-btn" onclick="event.stopPropagation(); toggleCategory()">➕</button>
        <textarea id="user-in" placeholder="Ask Veda anything..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button class="ui-btn" style="color:var(--primary)" onclick="handleSend()">⬆</button>
    </div>
</div>

<script>
let userName = localStorage.getItem('vedaUserName') || "User";
let currentMode = "Auto";
const VERCEL_URL = "https://veda-brain-q1ju.vercel.app/ask";

// --- 1. Login ---
function doLogin() {
    const val = document.getElementById('user-name-in').value.trim();
    if(val) {
        userName = val;
        localStorage.setItem('vedaUserName', val);
        document.getElementById('login-overlay').style.display = 'none';
        updateUI();
        addMsg(`Namaste **${userName}**! Main active hoon.`, 'bot');
    }
}
if(localStorage.getItem('vedaUserName')) {
    document.getElementById('login-overlay').style.display = 'none';
    updateUI();
}

// --- 2. Smart Logic ---
async function processLogic(q) {
    const query = q.toLowerCase().trim();
    const isAdv = document.getElementById('advanceModeToggle').checked;

    // A. Priority 1: AI Image Generation 🎨
    if(query.includes("image") || query.includes("photo") || query.includes("create") || currentMode === 'Image') {
        const prompt = query.replace(/image|photo|generate|create|dikhao|make/g, "").trim();
        if(prompt.length > 2) {
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true`;
            return `Result: <br><img src="${url}" class="ai-media">`;
        }
    }

    // B. Priority 2: External Files Database (Anime, Study, etc.)
    const db = { 
        ...(window.vedaCore || {}), 
        ...(window.vedaStudy || {}), 
        ...(window.vedaAnime || {}), 
        ...(window.vedaResponses || {}),
        ...(JSON.parse(localStorage.getItem('vedaMemory')) || {})
    };
    if(db[query]) return db[query];

    // C. Priority 3: Identity & Dev
    if(query.includes("owner") || query.includes("developer")) return "Mujhe **Thoughts Sounds** ne banaya hai.";

    // D. Priority 4: Vercel PRO Mode
    if(isAdv) {
        try {
            const res = await fetch(VERCEL_URL, {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ query: q, user: userName })
            });
            const data = await res.json();
            if(data.reply) return data.reply;
        } catch(e) { console.log("AI Offline"); }
    }

    // E. Priority 5: Wikipedia Search
    try {
        const res = await fetch(`https://hi.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
        const data = await res.json();
        if(data.extract) return (data.thumbnail ? `<img src="${data.thumbnail.source}" class="ai-media" style="max-width:200px;"><br>` : "") + data.extract;
    } catch(e) {}

    return "🤔 Mujhe iska jawab nahi mila. Kya aap mujhe sikha sakte hain?";
}

// --- 3. UI Core ---
async function handleSend() {
    const inp = document.getElementById('user-in');
    const val = inp.value.trim();
    if(!val) return;

    addMsg(val, 'user');
    inp.value = "";
    inp.style.height = 'auto';

    const id = "bot-" + Date.now();
    addMsg("Thinking...", "bot", id);

    const reply = await processLogic(val);
    document.getElementById(id).querySelector('.txt-body').innerHTML = reply;
}

function addMsg(txt, role, id=null) {
    const box = document.getElementById('chat-box');
    const row = document.createElement('div');
    row.className = `row ${role}`;
    if(id) row.id = id;

    row.innerHTML = `
        <div class="avatar">${role === 'user' ? 'U' : 'V'}</div>
        <div class="content">
            <div class="txt-body">${txt}</div>
            ${role === 'bot' ? `<div class="actions">
                <button class="act-btn" onclick="speak('${id}')">🔊 Speak</button>
                <button class="act-btn" onclick="copy('${id}')">📋 Copy</button>
            </div>` : ''}
        </div>`;
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
}

// --- 4. Utilities ---
function toggleMenu(s) { 
    document.getElementById('settings-menu').classList.toggle('open', s);
    document.getElementById('menu-overlay').style.display = s ? 'block' : 'none';
}
function toggleCategory() {
    const p = document.getElementById('category-popup');
    p.style.display = (p.style.display === 'block') ? 'none' : 'block';
}
function closeAll() {
    document.getElementById('category-popup').style.display = 'none';
    toggleMenu(false);
}
function toggleLightMode() { document.body.classList.toggle('light-mode'); }
function setMode(m) { currentMode = m; toggleCategory(); addMsg(`Mode: ${m}`, 'bot'); }
function updateUI() { document.getElementById('header-user').innerHTML = `${userName}<br>VEDA-7777`; }
function speak(id) {
    const t = document.getElementById(id).querySelector('.txt-body').innerText;
    const u = new SpeechSynthesisUtterance(t); u.lang = 'hi-IN'; window.speechSynthesis.speak(u);
}
function copy(id) {
    const t = document.getElementById(id).querySelector('.txt-body').innerText;
    navigator.clipboard.writeText(t); alert("Copied!");
}
function toggleAdvanceTheme() {
    const isAdv = document.getElementById('advanceModeToggle').checked;
    document.getElementById('veda-title').innerText = isAdv ? "VEDA PRO 🚀" : "VEDA AI PRO";
}
</script>
</body>
</html>
