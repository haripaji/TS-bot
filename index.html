<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veda AI Pro | Modular</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* Internal Fallback Styles */
        :root { --primary: #10a37f; --bg: #0b0e11; --text: #ececf1; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 12px; border-radius: 15px; max-width: 85%; line-height: 1.5; }
        .user .bubble { background: var(--primary); align-self: flex-end; margin-left: auto; }
        .bot .bubble { background: #2f2f3d; align-self: flex-start; }
        .input-area { padding: 15px; display: flex; gap: 10px; background: #1a1a2e; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; }
    </style>
</head>
<body>

<header style="padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between;">
    <div style="color: var(--primary); font-weight: bold;">VEDA OS v3.0</div>
    <div id="veda-id-display" style="font-size: 10px; opacity: 0.5;"></div>
</header>

<div id="chat-box"></div>

<div class="input-area">
    <input type="text" id="user-in" placeholder="Ask anything...">
    <button onclick="handleSend()" style="background: var(--primary); border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer;">Send</button>
</div>

<script src="responses.js"></script> <script src="study.js"></script>     <script src="anime.js"></script>     <script src="core.js"></script>      <script>
// ==========================================
// VEDA CORE BRIDGE (Links all .js files)
// ==========================================

const CONFIG = {
    formspreeId: "xwvrzgvj",
    botName: "Veda AI Pro",
    userName: localStorage.getItem('vedaName') || "User",
    vedaID: localStorage.getItem('vedaID') || "VEDA-" + Math.random().toString(36).substr(2, 9).toUpperCase(),
    lang: localStorage.getItem('vedaLang') || "hi-IN"
};

// Global State for study.js and responses.js to use
let chatHistory = [];
let isSilentReportingEnabled = true;

window.onload = () => {
    document.getElementById('veda-id-display').innerText = CONFIG.vedaID;
    
    // Initial Animation (from anime.js if available)
    if(typeof startVedaIntro === "function") startVedaIntro();
    
    addMessage(`System Initialized. Welcome back, ${CONFIG.userName}.`, 'bot');
};

async function handleSend() {
    const input = document.getElementById('user-in');
    const query = input.value.trim();
    if (!query) return;

    addMessage(query, 'user');
    input.value = "";

    // 1. Check for local responses (from responses.js)
    // Assuming your responses.js has a function: getLocalResponse(query)
    let response = "";
    if (typeof getLocalResponse === "function") {
        response = getLocalResponse(query);
    }

    // 2. If no local response, use the AI Brain or Search
    if (!response) {
        response = await fetchAIBrain(query);
    }

    // 3. Silent Reporting (Integration for Formspree)
    if (query.length > 50 || query.includes("error") || query.includes("bug")) {
        triggerSilentReport("Automated Insight", query);
    }

    // 4. Update Memory (from study.js)
    if (typeof updateVedaMemory === "function") {
        updateVedaMemory(query, response);
    }

    typeMessage(response);
}

// --- ADVANCED FEATURES ---

async function fetchAIBrain(q) {
    // Fallback logic if Vercel is offline
    try {
        const res = await fetch("https://veda-brain-q1ju.vercel.app/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: q, user: CONFIG.userName, id: CONFIG.vedaID })
        });
        const data = await res.json();
        return data.reply;
    } catch (e) {
        // Wikipedia Fallback
        return await fetchWikiInfo(q);
    }
}

async function fetchWikiInfo(q) {
    const url = `https://hi.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`;
    const res = await fetch(url);
    const data = await res.json();
    return data.extract || "I am still learning about this. Should I report this to my developer?";
}

async function triggerSilentReport(type, content) {
    if(!isSilentReportingEnabled) return;
    
    fetch(`https://formspree.io/f/${CONFIG.formspreeId}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            _subject: `Veda Report: ${type}`,
            User: CONFIG.userName,
            VedaID: CONFIG.vedaID,
            Log: content,
            Lang: CONFIG.lang
        })
    });
}

function typeMessage(text) {
    const box = document.getElementById('chat-box');
    const container = document.createElement('div');
    container.className = "msg-container bot";
    const bubble = document.createElement('div');
    bubble.className = "bubble";
    container.appendChild(bubble);
    box.appendChild(container);

    let i = 0;
    const speed = 25;
    function typing() {
        if (i < text.length) {
            bubble.innerHTML += text.charAt(i);
            i++;
            box.scrollTop = box.scrollHeight;
            setTimeout(typing, speed);
        } else {
            // Trigger TTS if you want Veda to speak
            speak(text);
        }
    }
    typing();
}

function addMessage(text, side) {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = `msg-container ${side}`;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function speak(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = CONFIG.lang;
    window.speechSynthesis.speak(utterance);
}

document.getElementById('user-in').addEventListener('keypress', e => { if (e.key === 'Enter') handleSend(); });

</script>
</body>
</html>
