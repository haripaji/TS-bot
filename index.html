<!DOCTYPE html>
<html lang="hi", lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veda AI</title>
    <style>
        :root { 
            --primary: #10a37f; --bg: #0b0e11; --sidebar: #15191c; 
            --text: #ffffff; --border: rgba(255,255,255,0.08); --card: #1e2329; 
            --accent: linear-gradient(45deg, #00f2fe, #4facfe);
        }
        .light-theme { --bg: #f8f9fa; --text: #1e2329; --sidebar: #ffffff; --card: #f0f2f5; --border: rgba(0,0,0,0.1); }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { height: 100vh; background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; }

        /* UI Elements */
        header { height: 60px; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        #sidebar { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: var(--sidebar); padding: 20px; transition: .4s; z-index: 100; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        #sidebar.open { left: 0; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg-container { max-width: 85%; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; } .bot { align-self: flex-start; }
        .bubble { padding: 12px 18px; border-radius: 18px; font-size: 15px; line-height: 1.6; box-shadow: 0 4px 15px rgba(0,0,0,0.1); white-space: pre-wrap; word-wrap: break-word; }
        .user .bubble { background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .bot .bubble { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        .mode-indicator { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); margin-bottom: 4px; font-weight: bold; }
        .typing { font-size: 12px; color: var(--primary); margin: 10px 20px; display: none; }

        /* Input Area */
        .input-area { padding: 20px; background: var(--bg); border-top: 1px solid var(--border); }
        .input-wrapper { max-width: 900px; margin: 0 auto; background: var(--card); border-radius: 30px; display: flex; align-items: center; padding: 8px 15px; border: 1px solid var(--border); }
        input { flex: 1; background: none; border: none; color: var(--text); font-size: 16px; outline: none; padding: 10px; }
        
        .btn { background: none; border: none; cursor: pointer; color: var(--text); padding: 8px; font-size: 20px; transition: 0.2s; }
        #mic.active { color: #ff4b2b; animation: pulse 1s infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--primary); margin-bottom: 20px;">Veda Ultra</h2>
    <p style="font-size: 12px; opacity: 0.7; margin-bottom: 20px;">Category Selector:</p>
    <button class="btn" style="width:100%; text-align:left; font-size:16px; margin-bottom:10px;" onclick="setCategory('auto')">🤖 Auto Mode (AI)</button>
    <button class="btn" style="width:100%; text-align:left; font-size:16px; margin-bottom:10px;" onclick="setCategory('study')">📚 Study Mode</button>
    <button class="btn" style="width:100%; text-align:left; font-size:16px; margin-bottom:10px;" onclick="setCategory('anime')">⛩️ Anime Mode</button>
    <hr style="border: 0.5px solid var(--border); margin: 20px 0;">
    <button class="btn" style="font-size:14px;" onclick="clearChat()">🗑 Clear History</button>
</div>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <span onclick="document.getElementById('sidebar').classList.toggle('open')" style="cursor:pointer; font-size:24px;">☰</span>
        <div style="line-height:1">
            <b style="color:var(--primary)">VEDA AI</b><br>
            <small id="current-mode" style="font-size:9px; opacity:0.6">MODE: AUTO</small>
        </div>
    </div>
    <button onclick="document.body.classList.toggle('light-theme')" class="btn">🌓</button>
</header>

<div id="chat-box"></div>
<div id="typing" class="typing">Veda is searching sources...</div>

<div class="input-area">
    <div class="input-wrapper">
        <button id="mic" class="btn">🎤</button>
        <input type="text" id="user-input" placeholder="Ask anything..." autocomplete="off">
        <button onclick="handleSend()" class="btn" style="color: var(--primary)">➤</button>
    </div>
    <p>Created by Thoughts Sounds</p>
</div>

<script src="responses.js"></script>
<script src="study.js"></script>
<script src="about.js"></script>
<script src="anime.js"></script>
<script src="core.js"></script>

<script>
// ===== CONFIGURATION =====
const API_KEY = "PASTE_YOUR_GEMINI_KEY_HERE";
let currentCategory = "auto";

const chatBox = document.getElementById('chat-box');
const typingInd = document.getElementById('typing');
const userInput = document.getElementById('user-input');

// ===== AI CALCULATOR LOGIC =====
const AICalculator = {
    check: (q) => /[0-9+\-*/().]{3,}/.test(q),
    solve: (q) => {
        try {
            // Basic math solver
            let result = eval(q.replace(/[^-()\d/*+.]/g, ''));
            return `AI Calculator: ${q} = **${result}** 🔢`;
        } catch(e) { return null; }
    }
};

// ===== CATEGORY HANDLER =====
function setCategory(cat) {
    currentCategory = cat;
    document.getElementById('current-mode').innerText = "MODE: " + cat.toUpperCase();
    addMessage(`Veda has switched to **${cat.toUpperCase()}** mode.`, 'bot');
    document.getElementById('sidebar').classList.remove('open');
}

// ===== MAIN SEND LOGIC =====
async function handleSend() {
    const query = userInput.value.trim();
    if(!query) return;

    addMessage(query, 'user');
    userInput.value = "";
    typingInd.style.display = "block";

    let response = "";

    // 1. Check Calculator Priority
    if(AICalculator.check(query)) {
        response = AICalculator.solve(query);
    }

    // 2. Route by Category (If not calculator)
    if(!response) {
        if(currentCategory === 'study' && window.StudyModule) response = StudyModule.get(query);
        else if(currentCategory === 'anime' && window.AnimeModule) response = AnimeModule.get(query);
    }

    // 3. AUTO MODE / FALLBACK (Wikipedia + Gemini AI)
    if(!response || currentCategory === 'auto') {
        const wikiData = await fetchWiki(query);
        response = await getGeminiAI(query, wikiData);
    }

    typingInd.style.display = "none";
    typeEffect(response);
}

// ===== EXTERNAL API CALLS =====
async function fetchWiki(q) {
    try {
        const res = await fetch(`https://hi.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
        const data = await res.json();
        return data.extract ? `Wikipedia Info: ${data.extract}` : "";
    } catch(e) { return ""; }
}

async function getGeminiAI(prompt, context) {
    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                contents: [{ parts: [{ text: `Context: ${context}\nCategory: ${currentCategory}\nUser: ${prompt}` }] }]
            })
        });
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    } catch(e) { return "Server issue. Please check your API key."; }
}

// ===== UI UTILS =====
function addMessage(text, side) {
    const div = document.createElement('div');
    div.className = `msg-container ${side}`;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function typeEffect(text) {
    const div = document.createElement('div');
    div.className = "msg-container bot";
    const bubble = document.createElement('div');
    bubble.className = "bubble";
    div.appendChild(bubble);
    chatBox.appendChild(div);

    let i = 0;
    let timer = setInterval(() => {
        bubble.innerText = text.substring(0, i);
        if(i++ >= text.length) { clearInterval(timer); chatBox.scrollTop = chatBox.scrollHeight; }
    }, 5);
}

function clearChat() { chatBox.innerHTML = ""; }

// ===== VOICE INPUT =====
const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
rec.lang = 'hi-IN';
document.getElementById('mic').onclick = () => rec.start();
rec.onstart = () => document.getElementById('mic').classList.add('active');
rec.onend = () => document.getElementById('mic').classList.remove('active');
rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; handleSend(); };

userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
</script>
</body>
</html>
