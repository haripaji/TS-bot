<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TS Bot</title>
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* --- Core Styling --- */
        :root { 
            --bg: #131314; --card: #1e1f20; --primary: #8ab4f8; 
            --text: #e3e3e3; --border: #444746; --user-msg: #2b2c2d;
        }
        * { box-sizing: border-box; font-family: 'Google Sans', 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- Auth Screen --- */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .auth-card { text-align: center; width: 90%; max-width: 380px; }
        .auth-card h1 { font-size: 2.5rem; margin-bottom: 30px; color: var(--primary); font-weight: 500; }
        .auth-input { width: 100%; padding: 14px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 12px; outline: none; font-size: 16px; }
        .auth-input:focus { border-color: var(--primary); }
        .login-btn { width: 100%; padding: 14px; background: var(--primary); color: #000; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px; }

        /* --- Sidebars --- */
        #sidebar, #user-sidebar { position: fixed; top: 0; bottom: 0; width: 280px; background: #0b0b0b; z-index: 10001; transition: 0.3s ease; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        #sidebar { left: -280px; border-right: 1px solid var(--border); }
        #user-sidebar { right: -280px; border-left: 1px solid var(--border); }
        #sidebar.active { left: 0; }
        #user-sidebar.active { right: 0; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10000; display: none; }
        .sidebar-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border); color: white; border-radius: 8px; text-align: left; cursor: pointer; font-size: 14px; }

        /* --- Header --- */
        header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg); z-index: 10; }
        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .user-av { width: 36px; height: 36px; background: #3c4043; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); font-size: 15px; font-weight: bold; color: var(--primary); }

        /* --- Chat Area --- */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 25px; scroll-behavior: smooth; }
        .row { max-width: 800px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { align-self: flex-end; background: var(--user-msg); padding: 12px 18px; border-radius: 18px; max-width: 85%; border-bottom-right-radius: 4px; }
        .bot-msg { align-self: flex-start; max-width: 90%; }
        .toolkit { display: flex; gap: 15px; margin-top: 8px; }
        .tool-icon { background: none; border: none; color: #9aa0a6; cursor: pointer; font-size: 16px; }

        /* --- Footer & Input --- */
        .footer { padding: 10px 15px 20px; max-width: 800px; margin: 0 auto; width: 100%; text-align: center; }
        .input-bar { background: var(--card); border-radius: 30px; padding: 8px 18px; display: flex; align-items: center; gap: 12px; border: 1px solid transparent; }
        textarea { flex: 1; background: none; border: none; color: white; outline: none; resize: none; font-size: 16px; max-height: 150px; }
        .cat-status { font-size: 11px; color: #9aa0a6; margin-top: 8px; text-transform: uppercase; }

        /* --- Category Menu --- */
        #cat-menu { position: fixed; bottom: 90px; left: 20px; background: #2d2e30; border: 1px solid var(--border); border-radius: 12px; display: none; flex-direction: column; z-index: 10002; }
        .cat-item { padding: 14px 22px; cursor: pointer; border-bottom: 1px solid #3c4043; font-size: 14px; }
        
        /* --- Feedback Modal --- */
        #feedback-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 20000; }
        .modal-content { background: #2d2e30; padding: 20px; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid var(--border); }
        .modal-textarea { width: 100%; height: 100px; background: #1e1f20; border: 1px solid var(--border); border-radius: 8px; color: white; padding: 10px; outline: none; resize: none; margin-bottom: 15px; margin-top: 10px; }
        .modal-btn { padding: 8px 16px; border-radius: 20px; border: none; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1>TS Bot</h1>
        <input type="text" id="reg-name" class="auth-input" placeholder="Aapka Naam">
        <input type="email" id="reg-email" class="auth-input" placeholder="Aapka Email">
        <button class="login-btn" onclick="handleAuth()">Get Started</button>
    </div>
</div>

<div id="overlay" onclick="closeAll()"></div>

<div id="user-sidebar">
    <h3 style="color:var(--primary); margin-bottom:15px;">User Profile</h3>
    <div style="background:#1e1f20; padding:15px; border-radius:10px; font-size:14px; border: 1px solid var(--border);">
        <p><strong>Name:</strong> <span id="p-name">--</span></p>
        <p style="margin-top:8px;"><strong>Email:</strong> <span id="p-email" style="font-size:12px; color:var(--primary);">--</span></p>
        <p style="margin-top:8px;"><strong>Sessions:</strong> <span id="p-chats">0</span></p>
        <div style="display:flex; justify-content:space-around; margin-top:15px; border-top:1px solid var(--border); padding-top:10px;">
            <span>👍 <span id="p-likes">0</span></span>
            <span>👎 <span id="p-dislikes">0</span></span>
        </div>
    </div>
    <button class="sidebar-btn" style="margin-top:auto; color:#f28b82;" onclick="logout()">Log Out</button>
</div>

<div id="sidebar">
    <button class="sidebar-btn" style="color:var(--primary); border-color:var(--primary);" onclick="startNewChat()">+ New Chat</button>
    <div id="history-container" style="flex:1; overflow-y:auto; margin-top:10px; display:flex; flex-direction:column; gap:8px;"></div>
    <button class="sidebar-btn" onclick="saveCurrentChat()">💾 Save Current Chat</button>
    <button class="sidebar-btn" onclick="clearAllHistory()" style="color:#f28b82;">🗑️ Clear History</button>
</div>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <button class="menu-btn" onclick="toggleSidebar('sidebar')">☰</button>
        <div class="logo">TS Bot <span style="color:var(--primary)">Pro</span></div>
    </div>
    <div class="user-av" onclick="toggleSidebar('user-sidebar')" id="av-char">U</div>
</header>

<div id="chat-box"></div>

<div id="feedback-modal">
    <div class="modal-content">
        <h3 style="color:var(--primary);">Help Bot Improve</h3>
        <textarea id="feedback-text" class="modal-textarea" placeholder="Is jawab mein kya kami thi?"></textarea>
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button class="modal-btn" style="background:transparent; color:#9aa0a6;" onclick="closeFeedback()">Cancel</button>
            <button class="modal-btn" style="background:var(--primary); color:#000;" onclick="saveDetailedFeedback()">Submit</button>
        </div>
    </div>
</div>

<div id="cat-menu">
    <div class="cat-item" onclick="selectCat('All', 'Universal Mode')">🌐 All Mode</div>
    <div class="cat-item" onclick="selectCat('Study 📚✏', 'Academic Focus')">📚 Study Mode</div>
    <div class="cat-item" onclick="selectCat('Wikipedia 🌐', 'Encyclopedia API')">📖 Wikipedia</div>
    <div class="cat-item" onclick="selectCat('Google Search 🔍', 'Live Internet')">🔍 Google Search</div>
</div>

<div class="footer">
    <div class="input-bar">
        <button class="tool-icon" style="font-size:22px;" onclick="toggleCatMenu()">＋</button>
        <textarea id="main-input" placeholder="Ask TS Bot..." rows="1" oninput="autoResize(this)"></textarea>
        <button class="tool-icon" onclick="startMic()">🎙️</button>
        <button class="tool-icon" style="color:var(--primary); font-size:20px;" onclick="sendMessage()">➤</button>
    </div>
    <div class="cat-status" id="status-label">MODE: UNIVERSAL MODE</div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyAHVrybvj-G6OlWDhuk6lMYQkfzL0uo13c",
        authDomain: "ts-bot-24442.firebaseapp.com",
        projectId: "ts-bot-24442",
        storageBucket: "ts-bot-24442.firebasestorage.app",
        messagingSenderId: "31578982286",
        appId: "1:31578982286:web:fb393ee8fde147cf74c6df"
    };
    firebase.initializeApp(firebaseConfig);
    const cloudDB = firebase.firestore();

    // --- GLOBALS ---
    let user = JSON.parse(localStorage.getItem('tsUser')) || null;
    let history = JSON.parse(localStorage.getItem('tsHistory')) || [];
    let currentCat = "All";
    let activeMsgIdForFeedback = null;

    if(user) {
        document.getElementById('auth-screen').style.display = 'none';
        updateProfileStats();
    }

    // --- AUTH ---
    async function handleAuth() {
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        if(!name || !email) return alert("Details bhariye!");

        const userRef = cloudDB.collection("users").doc(email);
        const doc = await userRef.get();
        
        if (!doc.exists) {
            user = { name, email, feedback: { likes: 0, dislikes: 0, logs: [] } };
            await userRef.set(user);
        } else {
            user = doc.data();
        }
        
        localStorage.setItem('tsUser', JSON.stringify(user));
        location.reload();
    }
    function logout() { localStorage.removeItem('tsUser'); location.reload(); }

    // --- CHAT ENGINE ---
    async function sendMessage() {
        const input = document.getElementById('main-input');
        const text = input.value.trim();
        if(!text) return;

        createMsg(text, 'user');
        input.value = "";
        input.style.height = 'auto';

        setTimeout(async () => {
            let response = "";
            const query = text.toLowerCase();

            if (currentCat === 'Wikipedia 🌐') {
                response = await fetchFromWiki(text);
            } else if (currentCat === 'Google Search 🔍') {
                response = `Searching...<br><iframe src="https://www.bing.com/search?q=${encodeURIComponent(text)}" style="width:100%;height:350px;border-radius:10px;margin-top:10px;background:white;border:none;"></iframe>`;
            } else if (query.includes("hello") || query.includes("hi")) {
                response = `Namaste ${user.name}! Main TS Bot hoon. Kaise madad karun?`;
            } else {
                response = `Mujhe iska exact answer nahi mila. Aap ye try karein:<br><br>
                <button class="sidebar-btn" style="width:auto; color:var(--primary);" onclick="triggerAutoSearch('Wiki', '${text}')">📖 Wiki</button>`;
            }

            createMsg(response, 'bot');
            saveMessageToCloud(text, response);
        }, 600);
    }

    // --- UTILITIES ---
    async function fetchFromWiki(query) {
        try {
            const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
            const data = await res.json();
            return data.extract || "Nahi mila.";
        } catch { return "Error loading Wiki."; }
    }

    function createMsg(text, sender) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        const msgId = "msg-" + Date.now();
        div.className = `row ${sender}-msg`;
        div.id = msgId;
        
        let html = `<div class="msg-content">${text}</div>`;
        if(sender === 'bot') {
            html += `<div class="toolkit">
                <button class="tool-icon" onclick="speakText('${msgId}')">🔊</button>
                <button class="tool-icon" onclick="copyText('${msgId}')">📋</button>
                <button class="tool-icon" onclick="handleFeedback('${msgId}', 'like')">👍</button>
                <button class="tool-icon" onclick="handleFeedback('${msgId}', 'dislike')">👎</button>
            </div>`;
        }
        div.innerHTML = html;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // --- TOOLS ---
    function speakText(id) {
        const text = document.getElementById(id).querySelector('.msg-content').innerText;
        const s = new SpeechSynthesisUtterance(text);
        s.lang = 'hi-IN';
        window.speechSynthesis.speak(s);
    }
    function copyText(id) {
        const text = document.getElementById(id).querySelector('.msg-content').innerText;
        navigator.clipboard.writeText(text);
        showToast("Copied!");
    }
    function startMic() {
        const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!Rec) return alert("Not supported.");
        const r = new Rec(); r.lang = 'hi-IN';
        r.onresult = (e) => { document.getElementById('main-input').value = e.results[0][0].transcript; sendMessage(); };
        r.start();
        showToast("Listening...");
    }

    // --- CLOUD LOGGING ---
    async function saveMessageToCloud(uText, bText) {
        if(!user) return;
        await cloudDB.collection("chats").add({
            email: user.email,
            user: uText,
            bot: bText,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    // --- UI HELPERS ---
    function toggleSidebar(id) { closeAll(); document.getElementById(id).classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
    function closeAll() { document.querySelectorAll('#sidebar, #user-sidebar').forEach(s => s.classList.remove('active')); document.getElementById('overlay').style.display = 'none'; document.getElementById('cat-menu').style.display = 'none'; }
    function toggleCatMenu() { const m = document.getElementById('cat-menu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
    function selectCat(name, label) { currentCat = name; document.getElementById('status-label').innerText = `MODE: ${label}`; closeAll(); }
    function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
    function updateProfileStats() {
        if(!user) return;
        document.getElementById('p-name').innerText = user.name;
        document.getElementById('p-email').innerText = user.email;
        document.getElementById('p-likes').innerText = user.feedback.likes;
        document.getElementById('p-dislikes').innerText = user.feedback.dislikes;
        document.getElementById('av-char').innerText = user.name[0].toUpperCase();
    }
    function showToast(msg) {
        const t = document.createElement('div');
        t.innerText = msg;
        t.style = "position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:5px 15px; border-radius:20px; z-index:99999;";
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    // --- HISTORY ---
    function saveCurrentChat() {
        const data = document.getElementById('chat-box').innerHTML;
        history.unshift({ id: Date.now(), title: "Saved Chat " + history.length, data });
        localStorage.setItem('tsHistory', JSON.stringify(history));
        renderHistory();
        showToast("Saved!");
    }
    function renderHistory() { document.getElementById('history-container').innerHTML = history.map(h => `<button class="sidebar-btn" onclick="loadChat(${h.id})">${h.title}</button>`).join(''); }
    function loadChat(id) { const item = history.find(h => h.id == id); document.getElementById('chat-box').innerHTML = item.data; closeAll(); }
    function startNewChat() { document.getElementById('chat-box').innerHTML = ""; closeAll(); createMsg("Hello! Main taiyar hoon.", "bot"); }
    function clearAllHistory() { localStorage.removeItem('tsHistory'); history=[]; renderHistory(); }
    
    // --- FEEDBACK ---
    function handleFeedback(id, type) {
        if(type === 'like') { user.feedback.likes++; saveUser(); showToast("Liked!"); }
        else { activeMsgIdForFeedback = id; document.getElementById('feedback-modal').style.display = 'flex'; }
    }
    function closeFeedback() { document.getElementById('feedback-modal').style.display = 'none'; }
    async function saveDetailedFeedback() {
        user.feedback.dislikes++;
        const issue = document.getElementById('feedback-text').value;
        user.feedback.logs.push({ issue, date: new Date() });
        saveUser();
        closeFeedback();
        showToast("Submitted!");
    }
    function saveUser() { localStorage.setItem('tsUser', JSON.stringify(user)); updateProfileStats(); }

    window.onload = () => { renderHistory(); updateProfileStats(); };
</script>
</body>
</html>
