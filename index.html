<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veda AI</title>
    
    <script src="core.js"></script>
    <script src="responses.js"></script> 
    <script src="about.js"></script>
    <script src="amine.js"></script>
    <script src="script.js"></script>
    <script src="study.js"></script>


    <style>
        :root { 
            --primary: #10a37f; --bg: #343541; --sidebar: #202123; 
            --text: #ececf1; --border: rgba(255,255,255,0.1); --card: #444654; 
        }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { height: 100dvh; background: var(--bg); color: var(--text); overflow: hidden; display: flex; flex-direction: column; }

        /* Header */
        header { height: 55px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; background: var(--bg); flex-shrink: 0; }
        .logo { font-weight: bold; color: var(--primary); font-size: 1.2rem; letter-spacing: 1px; }

        /* Chat Area */
        #chat-box { flex: 1; overflow-y: auto; padding-bottom: 20px; display: flex; flex-direction: column; scroll-behavior: smooth; }
        .row { width: 100%; padding: 25px 15px; display: flex; gap: 15px; border-bottom: 1px solid rgba(0,0,0,0.1); animation: fadeIn 0.3s ease; }
        .row.user { background: var(--bg); }
        .row.bot { background: var(--card); }
        
        .avatar { width: 32px; height: 32px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .user .avatar { background: #5436da; color: white; }
        .bot .avatar { background: var(--primary); color: white; }

        .content { flex: 1; font-size: 16px; line-height: 1.6; word-wrap: break-word; overflow: hidden; }
        
        /* Action Buttons */
        .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 15px; opacity: 0.7; }
        .act-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .act-btn:active { background: var(--primary); border-color: var(--primary); }

        /* Footer Input */
        .footer { padding: 10px 15px 35px; background: linear-gradient(180deg, transparent, var(--bg) 80%); }
        .input-wrapper { max-width: 800px; margin: 0 auto; background: #40414f; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: flex-end; padding: 10px 15px; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        
        textarea { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; resize: none; max-height: 150px; min-height: 24px; padding: 0; line-height: 24px; }
        .send-btn { background: var(--primary); color: white; border: none; border-radius: 6px; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-left: 10px; flex-shrink: 0; }

        /* Media Displays */
        .ai-image { width: 100%; max-width: 400px; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="logo">VEDA PRO 🚀</div>
    <div style="font-size: 10px; opacity: 0.5; text-align: right;">Thoughts Sounds<br>Build v4.0</div>
</header>

<div id="chat-box">
    <div class="row bot">
        <div class="avatar">V</div>
        <div class="content">
            Namaste! Main Veda AI Pro hoon. Main Text, Wikipedia Research aur AI Images generate kar sakta hoon. <br><br>
            <b>Try:</b> "Generate image of a space robot"
        </div>
    </div>
</div>

<div class="footer">
    <div class="input-wrapper">
        <textarea id="user-in" placeholder="Ask Veda anything..." rows="1" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="handleSend()">⬆</button>
    </div>
</div>

<script>
    // --- Configuration ---
    const VERCEL_API = "https://veda-brain-q1ju.vercel.app/ask";

    // --- Core Logic ---
    async function getAIResponse(query) {
        const q = query.toLowerCase().trim();

        // 1. Identity & Basic Answers
        if(q.includes("owner") || q.includes("developer") || q.includes("kisne banaya")) {
            return "Mujhe **Thoughts Sounds** ne design aur develop kiya hai.";
        }
        if(q === "hi" || q === "hello") return "Hello! Main aapki kaise madad kar sakta hoon?";

        // 2. AI Image Generation (DALL-E Style)
        if (q.includes("image") || q.includes("photo") || q.includes("generate") || q.includes("dikhao")) {
            const prompt = q.replace(/generate|image|of|photo|dikhao|make|create/g, "").trim();
            if(prompt.length > 2) {
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true&seed=${Math.floor(Math.random()*1000)}`;
                return `Ye rahi aapki AI generated image: <br><img src="${imgUrl}" class="ai-image" alt="${prompt}">`;
            }
        }

        // 3. Wikipedia Search (Knowledge)
        const wiki = await fetchWiki(q);
        if(wiki) return (wiki.img ? `<img src="${wiki.img}" class="ai-image" style="max-width:200px;"><br>` : "") + wiki.text;

        // 4. Fallback (Learning / Thinking)
        return "Main abhi iske baare mein seekh raha hoon. Kya aap mujhe thoda aur samjha sakte hain?";
    }

    async function fetchWiki(query) {
        try {
            const res = await fetch(`https://hi.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
            const data = await res.json();
            if (data.extract && query.length > 2) {
                return { text: data.extract, img: data.thumbnail ? data.thumbnail.source : null };
            }
            return null;
        } catch(e) { return null; }
    }

    // --- UI Handlers ---
    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    async function handleSend() {
        const inp = document.getElementById('user-in');
        const val = inp.value.trim();
        if(!val) return;

        addMessage(val, 'user');
        inp.value = "";
        inp.style.height = 'auto';
        
        const botId = "bot-" + Date.now();
        addMessage("Thinking...", 'bot', botId);
        
        const response = await getAIResponse(val);
        updateMessage(botId, response);
    }

    function addMessage(text, role, id = null) {
        const box = document.getElementById('chat-box');
        const row = document.createElement('div');
        row.className = `row ${role}`;
        if(id) row.id = id;

        row.innerHTML = `
            <div class="avatar">${role === 'user' ? 'U' : 'V'}</div>
            <div class="content">
                <div class="text-body">${text}</div>
                ${role === 'bot' ? `
                <div class="actions">
                    <button class="act-btn" onclick="speak('${id}')">🔊 Speak</button>
                    <button class="act-btn" onclick="copy('${id}')">📋 Copy</button>
                    <button class="act-btn" onclick="this.innerText='👍 Done'">👍</button>
                    <button class="act-btn" onclick="this.innerText='👎 Done'">👎</button>
                </div>` : ''}
            </div>
        `;
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
    }

    function updateMessage(id, text) {
        const el = document.getElementById(id).querySelector('.text-body');
        el.innerHTML = text;
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }

    // --- Features ---
    function speak(id) {
        const text = document.getElementById(id).querySelector('.text-body').innerText;
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'hi-IN';
        window.speechSynthesis.speak(utter);
    }

    function copy(id) {
        const text = document.getElementById(id).querySelector('.text-body').innerText;
        navigator.clipboard.writeText(text);
        alert("Text copied!");
    }

    // Mobile Key Handling
    document.getElementById('user-in').addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && !e.shiftKey && window.innerWidth > 768) {
            e.preventDefault();
            handleSend();
        }
    });
</script>
</body>
</html>
