<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veda AI - The Ultimate Intelligence</title>
    <script src="core.js"></script>
    <script src="study.js"></script>
    <script src="anime.js"></script>
    <script src="about.js"></script>
    <script src="responses.js"></script>

    <style>


        :root { --primary: #10a37f; --bg: #343541; --sidebar: #202123; --text: #ececf1; --border: rgba(255,255,255,0.1); --card: #444654; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); overflow: hidden; display: flex; flex-direction: column; }

        header { width: 100%; height: 60px; background: rgba(52, 53, 65, 0.95); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; z-index: 100; justify-content: space-between; flex-shrink: 0; }
        .title { font-weight: 600; font-size: 1.2rem; color: var(--primary); letter-spacing: 1px; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .msg-container { display: flex; flex-direction: column; gap: 8px; max-width: 90%; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; } .bot { align-self: flex-start; width: 100%; }
        .bubble { padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.6; word-wrap: break-word; }
        .user .bubble { background: var(--card); border: 1px solid var(--border); border-bottom-right-radius: 2px; }
        .bot .bubble { background: none; padding-left: 0; color: #d1d1e0; }
        
        /* Action Buttons */
        .action-bar { display: flex; gap: 18px; font-size: 15px; color: #8e8ea0; margin-top: 5px; }
        .action-bar span { cursor: pointer; transition: 0.2s; }
        .action-bar span:hover { color: var(--primary); }

        /* Slider & Popups */
        #settings-menu { position: fixed; top: 0; left: -100%; width: 85%; max-width: 300px; height: 100%; background: var(--sidebar); z-index: 1001; padding: 25px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        #settings-menu.open { left: 0; }
        #menu-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; backdrop-filter: blur(3px); }
        #category-popup { display: none; position: fixed; bottom: 85px; left: 20px; background: var(--sidebar); border: 1px solid var(--border); border-radius: 15px; padding: 12px; z-index: 150; width: 200px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .menu-btn { width: 100%; background: #2d2d39; border: none; color: white; padding: 12px; text-align: left; margin-bottom: 10px; border-radius: 10px; cursor: pointer; font-size: 14px; }
        .menu-btn:hover { background: #3e3e4a; color: var(--primary); }

        .wiki-img { width: 100%; max-width: 280px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); display: block; }

        .footer { width: 100%; padding: 10px 15px 30px; background: var(--bg); flex-shrink: 0; }
        .input-container { max-width: 800px; margin: 0 auto; background: #40414f; border-radius: 15px; display: flex; align-items: center; padding: 8px 15px; border: 1px solid var(--border); }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; padding: 8px 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onclick="closeAll()">

<div id="menu-overlay" onclick="toggleMenu(false)"></div>

<header>
    <button onclick="event.stopPropagation(); toggleMenu(true)" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">☰</button>
    <div class="title">VEDA AI</div>
    <div id="header-user" style="font-size:10px; color:#8e8ea0; text-align:right;">User<br>VEDA-0000</div>
</header>

<div id="chat-box"></div>

<div id="category-popup" onclick="event.stopPropagation()">
    <button class="menu-btn" onclick="setMode('Study')">📚 Study Mode</button>
    <button class="menu-btn" onclick="setMode('Math')">🧮 Math Solver</button>
    <button class="menu-btn" onclick="setMode('Anime')">⛩️ Anime Fan</button>
</div>

<div id="settings-menu" onclick="event.stopPropagation()">
    <h3 style="color:var(--primary); margin-bottom:20px;">Settings</h3>
    <div style="background: #1a1b1e; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px;">
        <div id="live-time" style="font-size: 1.6rem; font-weight: bold; color: var(--primary);">00:00:00</div>
        <div id="live-date" style="font-size: 0.8rem; color: #8e8ea0;">Loading Date...</div>
    </div>
    <button class="menu-btn" onclick="downloadChat()">📥 Download Chat (.txt)</button>
    <button class="menu-btn" onclick="clearBrain()" style="color:#ef4444;">🧠 Clear Memory</button>
    <button class="menu-btn" onclick="location.reload()">🔄 Restart</button>
</div>

<div class="footer">
    <div class="input-container">
        <button onclick="event.stopPropagation(); toggleCategory()" style="background:none; border:none; color:#8e8ea0; font-size:24px; margin-right:12px; cursor:pointer;">➕</button>
        <input type="text" id="user-in" placeholder="Ask Veda or Wikipedia..." autocomplete="off">
        <button onclick="handleSend()" style="background:none; border:none; color:var(--primary); font-size:24px; cursor:pointer;">⬆️</button>
    </div>
</div>

<script>
    let vedaMemory = JSON.parse(localStorage.getItem('vedaMemory')) || {};
    let learningMode = { active: false, question: "" };
    let chatLog = []; 
    const vedaID = localStorage.getItem('vedaUserID') || "VEDA-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('vedaUserID', vedaID);

    window.onload = () => { startClock(); updateUI(); addMessage("Namaste! Main Veda hoon. Main Wikipedia se photos aur text dono dikha sakta hoon.", "bot"); };

    function startClock() {
        setInterval(() => {
            const n = new Date();
            document.getElementById('live-time').innerText = n.toLocaleTimeString('en-GB');
            document.getElementById('live-date').innerText = n.toLocaleDateString('hi-IN', {day:'numeric', month:'long', year:'numeric'});
        }, 1000);
    }

    function toggleMenu(s) { 
        document.getElementById('settings-menu').classList.toggle('open', s);
        document.getElementById('menu-overlay').style.display = s ? 'block' : 'none';
    }

    function toggleCategory() {
        const p = document.getElementById('category-popup');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    function closeAll() { 
        document.getElementById('category-popup').style.display = 'none'; 
        toggleMenu(false);
    }

    function setMode(m) { addMessage(`Mode switched to: ${m}`, "bot"); toggleCategory(); }

    async function handleSend() {
        const inp = document.getElementById('user-in');
        const val = inp.value.trim();
        if(!val) return;
        addMessage(val, 'user');
        inp.value = "";
        const reply = await processLogic(val);
        addMessage(reply, 'bot');
    }

    async function processLogic(q) {
        const query = q.toLowerCase();
        
        if (learningMode.active) {
            vedaMemory[learningMode.question] = q;
            localStorage.setItem('vedaMemory', JSON.stringify(vedaMemory));
            learningMode.active = false;
            return "Dhanyawad! Maine ise yaad kar liya hai.";
        }

        // 1. Local Files Search (Modular JS Support)
        const dbs = [window.vedaCore, window.vedaStudy, window.vedaAnime]; 
        // Nayi file ko dbs list mein yahan add karein (e.g. window.vedaMovies)
        for(let db of dbs) { if(db && db[query]) return db[query]; }

        // 2. Wikipedia Search (Hindi Priority + Images)
        const langs = ['hi', 'en'];
        for (let lang of langs) {
            try {
                const res = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.extract) {
                        let html = "";
                        if (data.thumbnail && data.thumbnail.source) {
                            html += `<img src="${data.thumbnail.source}" class="wiki-img">`;
                        }
                        html += data.extract + ` <br><br><small style="color:var(--primary);">Source: Wikipedia (${lang.toUpperCase()})</small>`;
                        return html;
                    }
                }
            } catch(e) {}
        }

        // 3. Learned Memory
        if (vedaMemory[query]) return vedaMemory[query] + " <br><small style='color:var(--primary); font-size:9px;'>(Learned)</small>";

        // 4. Learning Trigger + Google Search Button
        learningMode.active = true;
        learningMode.question = query;
        const gUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
        return `Mujhe iska jawab nahi pata. **Kya aap mujhe sikha sakte hain?** <br><button onclick="window.open('${gUrl}')" style="color:var(--primary); background:none; border:1px solid; padding:5px 12px; border-radius:8px; margin-top:10px; cursor:pointer;">Search Google 🔍</button>`;
    }

    function addMessage(txt, sender) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg-container ${sender}`;
        
        const cleanTxtForVoice = txt.replace(/<\/?[^>]+(>|$)/g, "");
        chatLog.push(`${sender === 'user' ? 'YOU' : 'VEDA'}: ${cleanTxtForVoice}`);

        const actions = (sender === 'bot') ? `
            <div class="action-bar">
                <span onclick="speak('${cleanTxtForVoice.replace(/'/g, "\\'")}')">🔊</span>
                <span onclick="this.style.color='var(--primary)'">👍</span>
                <span onclick="navigator.clipboard.writeText('${cleanTxtForVoice}'); alert('Copied!')">📋</span>
            </div>` : "";

        div.innerHTML = `<div class="bubble">${txt}</div>${actions}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function downloadChat() {
        if (chatLog.length === 0) return alert("Kuch chat toh karein!");
        const blob = new Blob([chatLog.join('\n\n')], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Veda_History_${new Date().getTime()}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function speak(t) {
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(t);
        u.lang = 'hi-IN';
        window.speechSynthesis.speak(u);
    }

    function clearBrain() { if(confirm("Mita dun?")) { localStorage.removeItem('vedaMemory'); location.reload(); } }
    function updateUI() { document.getElementById('header-user').innerHTML = `User<br>${vedaID}`; }
    document.getElementById('user-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
</script>
</body>
</html>
