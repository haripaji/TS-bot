<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veda AI - The Learning Bot</title>
    <style>
        :root { --primary: #10a37f; --bg: #343541; --sidebar: #202123; --text: #ececf1; --border: rgba(255,255,255,0.1); --card: #444654; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); overflow: hidden; display: flex; flex-direction: column; }

        header { width: 100%; height: 60px; background: rgba(52, 53, 65, 0.95); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; z-index: 100; justify-content: space-between; flex-shrink: 0; }
        .title { font-weight: 600; font-size: 1.1rem; color: var(--primary); }
        .user-info { font-size: 10px; color: #8e8ea0; text-align: right; line-height: 1.2; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .msg-container { display: flex; flex-direction: column; gap: 8px; max-width: 95%; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; } 
        .bot { align-self: flex-start; width: 100%; }
        .bubble { padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.6; word-wrap: break-word; }
        .user .bubble { background: var(--card); border: 1px solid var(--border); border-bottom-right-radius: 2px; }
        .bot .bubble { background: none; padding-left: 0; }
        
        .action-bar { display: flex; gap: 18px; font-size: 15px; color: #8e8ea0; margin-top: 5px; }
        .action-bar span { cursor: pointer; transition: 0.2s; }
        .action-bar span:hover { color: var(--primary); }

        /* Slider Menu */
        #settings-menu { position: fixed; top: 0; left: -100%; width: 85%; max-width: 320px; height: 100%; background: var(--sidebar); z-index: 1001; padding: 25px; transition: 0.4s ease; box-shadow: 10px 0 30px rgba(0,0,0,0.5); overflow-y: auto; }
        #settings-menu.open { left: 0; }
        #menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; backdrop-filter: blur(3px); }

        .menu-btn { width: 100%; background: #2d2d39; border: none; color: white; padding: 14px; text-align: left; margin-bottom: 12px; border-radius: 10px; cursor: pointer; font-size: 14px; }
        .profile-card { background: #2d2d39; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .calendar-card { background: #1a1b1e; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; text-align: center; }
        .time-text { font-size: 1.6rem; font-weight: bold; color: var(--primary); }

        .footer { width: 100%; padding: 10px 15px 30px; background: var(--bg); flex-shrink: 0; }
        .input-container { max-width: 800px; margin: 0 auto; background: #40414f; border-radius: 15px; display: flex; align-items: center; padding: 10px 15px; border: 1px solid var(--border); }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="menu-overlay" onclick="toggleMenu(false)"></div>

<header>
    <button onclick="toggleMenu(true)" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">☰</button>
    <div class="title">Veda AI</div>
    <div id="header-user" class="user-info">User<br>VEDA-0000</div>
</header>

<div id="chat-box"></div>

<div class="footer">
    <div class="input-container">
        <button style="background:none; border:none; color:#8e8ea0; font-size:24px; margin-right:10px; cursor:pointer;">➕</button>
        <input type="text" id="user-in" placeholder="Veda ko kuch sikhaein ya poochein..." autocomplete="off">
        <button onclick="handleSend()" style="background:none; border:none; color:var(--primary); font-size:24px; cursor:pointer;">⬆️</button>
    </div>
</div>

<div id="settings-menu">
    <h3 style="color:var(--primary); margin-bottom:20px;">Veda Settings</h3>
    
    <div class="profile-card">
        <div id="menu-user-name" style="font-weight: bold; font-size: 1.1rem;">User Name</div>
        <div id="menu-user-id" style="font-size: 11px; color: #8e8ea0; margin-bottom: 12px;">ID: VEDA-0000</div>
        <button class="menu-btn" style="background:var(--primary); margin:0; text-align:center;" onclick="triggerSignup()">👤 Edit Profile</button>
    </div>

    <div class="calendar-card">
        <div id="live-time" class="time-text">00:00:00</div>
        <div id="live-date" style="font-size: 0.9rem; color: #8e8ea0; margin: 5px 0;">Date</div>
        <div id="live-day" style="font-size: 0.8rem; color: var(--primary); font-weight: bold;">Day</div>
    </div>

    <button class="menu-btn" onclick="alert('Veda AI V1.9\nStatus: Learning Enabled')">ℹ️ About Veda</button>
    <button class="menu-btn" style="color:#ff4d4d;" onclick="clearMemory()">🧠 Reset Brain</button>
    <button class="menu-btn" onclick="location.reload()">🔄 Refresh</button>
</div>

<script>
    let vedaMemory = JSON.parse(localStorage.getItem('vedaMemory')) || {};
    let learningMode = { active: false, question: "" };
    let userName = localStorage.getItem('vedaName') || "User";
    const vedaUserID = localStorage.getItem('vedaUserID') || "VEDA-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('vedaUserID', vedaUserID);

    window.onload = () => {
        updateUI();
        startClock();
        addMessage(`Namaste ${userName}! Main Veda hoon. Aap mujhse sawal pooch sakte hain ya mujhe naye jawab sikha sakte hain.`, "bot");
    };

    function startClock() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString('en-GB');
            document.getElementById('live-date').innerText = now.toLocaleDateString('hi-IN', { day: 'numeric', month: 'long', year: 'numeric' });
            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            document.getElementById('live-day').innerText = days[now.getDay()];
        }, 1000);
    }

    function updateUI() {
        document.getElementById('header-user').innerHTML = `${userName}<br>${vedaUserID}`;
        document.getElementById('menu-user-name').innerText = userName;
        document.getElementById('menu-user-id').innerText = "ID: " + vedaUserID;
    }

    function toggleMenu(s) {
        document.getElementById('settings-menu').classList.toggle('open', s);
        document.getElementById('menu-overlay').style.display = s ? 'block' : 'none';
    }

    async function handleSend() {
        const input = document.getElementById('user-in');
        const val = input.value.trim();
        if(!val) return;

        addMessage(val, 'user');
        input.value = "";

        const box = document.getElementById('chat-box');
        const typing = document.createElement('div');
        typing.className = 'msg-container bot';
        typing.innerHTML = `<div class="bubble" style="color:#8e8ea0;">Veda is thinking...</div>`;
        box.appendChild(typing);
        box.scrollTop = box.scrollHeight;

        setTimeout(() => {
            typing.remove();
            const reply = processLogic(val);
            addMessage(reply, 'bot');
        }, 600);
    }

    function processLogic(q) {
        const query = q.toLowerCase();
        const now = new Date();

        // 1. Learning Response
        if (learningMode.active) {
            vedaMemory[learningMode.question] = q;
            localStorage.setItem('vedaMemory', JSON.stringify(vedaMemory));
            learningMode.active = false;
            return `Shukriya! Maine yaad kar liya hai ki "${learningMode.question}" ka matlab "${q}" hota hai.`;
        }

        // 2. Memory Check
        if (vedaMemory[query]) return vedaMemory[query] + " <br><small style='color:var(--primary); font-size:9px;'>(Learned)</small>";

        // 3. Time/Date/Day (Sirf poochne par)
        if (query.includes("time") || query.includes("samay")) return `Abhi **${now.toLocaleTimeString()}** ho rahe hain.`;
        if (query.includes("date") || query.includes("tarikh")) return `Aaj ki tarikh **${now.toLocaleDateString()}** hai.`;
        if (query.includes("day") || query.includes("din")) {
            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            return `Aaj **${days[now.getDay()]}** hai.`;
        }

        // 4. Math Solver
        if (/[\d]+[+\-*/][\d]+/.test(query)) {
            try { return `🧮 Hisab: **${eval(query.replace(/[^-()\d/*+. ]/g, ''))}**`; } catch(e) {}
        }

        // 5. If Unknown -> Trigger Learning
        learningMode.active = true;
        learningMode.question = query;
        return `Mujhe iska jawab nahi pata. **Kya aap mujhe sikha sakte hain?** (Bas iska jawab likh kar bhejiye)`;
    }

    function addMessage(txt, sender) {
        const box = document.getElementById('chat-box');
        const container = document.createElement('div');
        container.className = `msg-container ${sender}`;
        const safeTxt = txt.replace(/'/g, "\\'");
        const actions = (sender === 'bot') ? `
            <div class="action-bar">
                <span onclick="speak('${safeTxt}')">🔊</span>
                <span onclick="likeResponse(this)">👍</span>
                <span onclick="navigator.clipboard.writeText('${safeTxt}'); alert('Copied!')">📋</span>
            </div>` : "";
        container.innerHTML = `<div class="bubble">${txt}</div>${actions}`;
        box.appendChild(container);
        box.scrollTop = box.scrollHeight;
    }

    function likeResponse(el) {
        el.style.color = "var(--primary)";
        addMessage("Khushi hui ki aapko mera jawab pasand aaya! 😊", "bot");
    }

    function speak(t) {
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(t);
        u.lang = 'hi-IN';
        window.speechSynthesis.speak(u);
    }

    function triggerSignup() {
        let n = prompt("Naya naam:");
        if(n) { userName = n; localStorage.setItem('vedaName', n); updateUI(); }
    }

    function clearMemory() {
        if(confirm("Kya aap meri seekhi hui baatein mita dena chahte hain?")) {
            localStorage.removeItem('vedaMemory');
            vedaMemory = {};
            location.reload();
        }
    }

    document.getElementById('user-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
</script>
</body>
</html>
