<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veda AI Pro</title>
    
    <style>
        :root { 
            --primary: #10a37f; 
            --bg: #343541; 
            --sidebar: #202123; 
            --text: #ececf1; 
            --border: rgba(255,255,255,0.1); 
            --card: #444654; 
        }
        .light-mode { 
            --bg: #f7f7f8; 
            --text: #202123; 
            --sidebar: #ffffff; 
            --card: #e5e5e5; 
            --border: rgba(0,0,0,0.1); 
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; }
        html, body { height: 100%; background: var(--bg); color: var(--text); overflow: hidden; display: flex; flex-direction: column; }

        header { height: 60px; background: rgba(52,53,65,0.95); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; }
        .title { font-weight: 600; font-size: 1.3rem; color: var(--primary); }

        #chat-box { 
            flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 20px; 
        }
        .msg-container { max-width: 85%; animation: fadeIn 0.3s; }
        .user { align-self: flex-end; }
        .bot { align-self: flex-start; width: 100%; }
        .bubble { 
            padding: 14px 18px; 
            border-radius: 18px; 
            font-size: 15.8px; 
            line-height: 1.6; 
            position: relative;
        }
        .user .bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .bot .bubble { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        /* Typing Effect */
        .typing-bubble {
            min-height: 28px;
        }
        .typing-cursor {
            display: inline-block;
            width: 3px;
            height: 18px;
            background: var(--primary);
            vertical-align: middle;
            animation: blink 0.7s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Markdown */
        .bubble strong { font-weight: 700; }
        .bubble em { font-style: italic; }
        .bubble ul { padding-left: 22px; margin: 10px 0; }
        .bubble li { margin: 4px 0; }
        .bubble pre { 
            background: #1e1e2e; 
            padding: 12px; 
            border-radius: 10px; 
            overflow-x: auto; 
            margin: 10px 0; 
        }
        .bubble code { background: rgba(0,0,0,0.25); padding: 2px 6px; border-radius: 4px; font-family: monospace; }

        .msg-actions { margin-top: 8px; display: flex; gap: 10px; opacity: 0.7; }
        .msg-actions button { background: none; border: none; font-size: 19px; cursor: pointer; }
        .msg-actions button:hover { transform: scale(1.15); }

        .input-container { max-width: 820px; margin: 0 auto 15px; background: #40414f; border-radius: 50px; display: flex; align-items: center; padding: 8px 20px; border: 1px solid var(--border); }
        input { flex: 1; background: none; border: none; color: white; font-size: 16.5px; outline: none; }
    </style>
</head>
<body>

<div id="login-overlay" style="position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;align-items:center;justify-content:center;">
    <div style="background:var(--sidebar);padding:30px;border-radius:20px;width:90%;max-width:360px;text-align:center;border:1px solid var(--border);">
        <h2 style="color:var(--primary);">Veda AI Pro</h2>
        <input type="text" id="user-name-in" placeholder="आपका नाम..." style="width:100%;padding:14px;margin:15px 0;border-radius:10px;border:1px solid var(--border);background:#1a1b1e;color:white;">
        <button onclick="doLogin()" style="width:100%;padding:14px;background:var(--primary);border:none;color:white;border-radius:10px;font-weight:bold;cursor:pointer;">Veda को लॉन्च करें</button>
    </div>
</div>

<header>
    <button onclick="toggleMenu(true)" style="background:none;border:none;color:white;font-size:28px;">☰</button>
    <div class="title" id="veda-title">VEDA AI PRO</div>
    <div id="header-user" style="font-size:11px;color:#8e8ea0;text-align:right;">User<br>VEDA-0000</div>
</header>

<div id="chat-box"></div>

<div class="input-container">
    <button onclick="toggleCategory()" style="background:none;border:none;color:#8e8ea0;font-size:26px;margin-right:10px;">➕</button>
    <input type="text" id="user-in" placeholder="Veda से कुछ भी पूछें..." autocomplete="off">
    <button onclick="startVoiceInput()" style="background:none;border:none;color:#8e8ea0;font-size:24px;margin:0 8px;">🎤</button>
    <button onclick="handleSend()" style="background:none;border:none;color:var(--primary);font-size:28px;">⬆️</button>
</div>

<script>
// ================== VEDA AI PRO - AI Style Response ==================

let userName = localStorage.getItem('vedaUserName') || "User";
const vedaID = localStorage.getItem('vedaUserID') || "VEDA-" + Math.floor(1000 + Math.random() * 9000);
let lastUserQuery = "";
let lastBotMsgId = null;

const VERCEL_URL = "https://veda-brain-q1ju.vercel.app/ask";

window.onload = () => {
    if (localStorage.getItem('vedaUserName')) {
        document.getElementById('login-overlay').style.display = 'none';
        updateUI();
        setTimeout(() => {
            addMessage(`नमस्ते ${userName} जी! 🙏\nमैं Veda AI Pro हूँ। आज आपकी क्या मदद कर सकता हूँ?`, "bot");
        }, 600);
    }
};

function doLogin() {
    const name = document.getElementById('user-name-in').value.trim();
    if (!name) return alert("नाम लिखना जरूरी है!");
    userName = name;
    localStorage.setItem('vedaUserName', name);
    localStorage.setItem('vedaUserID', vedaID);
    document.getElementById('login-overlay').style.display = 'none';
    updateUI();
}

async function handleSend() {
    const input = document.getElementById('user-in');
    const query = input.value.trim();
    if (!query) return;

    addMessage(query, "user");
    lastUserQuery = query;
    input.value = "";

    // Show typing indicator
    const typingId = "typing-" + Date.now();
    showTyping(typingId);

    const reply = await getAIResponse(query);

    // Remove typing
    const typingEl = document.getElementById(typingId);
    if (typingEl) typingEl.remove();

    // Show reply with realistic typing effect
    typeMessage(reply);
}

// Get response from LLM or fallback
async function getAIResponse(query) {
    const isAdv = document.getElementById('advanceModeToggle') ? document.getElementById('advanceModeToggle').checked : true;

    if (isAdv) {
        try {
            const res = await fetch(VERCEL_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query: query, user: userName, mode: "Auto" })
            });
            const data = await res.json();
            if (data.reply) return data.reply;
        } catch (e) {
            console.log("LLM offline, using fallback");
        }
    }

    // Fallback (local + wiki)
    return "यह एक बहुत अच्छा सवाल है! लेकिन अभी मेरे पास इसकी पूरी जानकारी नहीं है। क्या आप मुझे और डिटेल बता सकते हैं?";
}

// Realistic Typing Effect (word by word)
function typeMessage(fullText) {
    const box = document.getElementById('chat-box');
    const msgId = "bot-" + Date.now();
    lastBotMsgId = msgId;

    const container = document.createElement('div');
    container.className = "msg-container bot";
    container.id = msgId;

    const bubble = document.createElement('div');
    bubble.className = "bubble typing-bubble";
    container.appendChild(bubble);

    box.appendChild(container);
    box.scrollTop = box.scrollHeight;

    const words = fullText.split(' ');
    let index = 0;
    let currentText = "";

    const interval = setInterval(() => {
        if (index < words.length) {
            currentText += (index > 0 ? " " : "") + words[index];
            bubble.innerHTML = renderMarkdown(currentText) + '<span class="typing-cursor"></span>';
            box.scrollTop = box.scrollHeight;
            index++;
        } else {
            clearInterval(interval);
            // Remove cursor and add actions
            bubble.innerHTML = renderMarkdown(fullText);
            addMessageActions(container, msgId);
            box.scrollTop = box.scrollHeight;
        }
    }, 45); // speed → 45ms per word (natural feel)
}

function renderMarkdown(text) {
    let html = text
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/^[-•]\s+(.+)$/gm, '<ul><li>$1</li></ul>')
        .replace(/<\/ul>\s*<ul>/g, '');

    return html;
}

function addMessageActions(container, msgId) {
    const actions = document.createElement('div');
    actions.className = "msg-actions";
    actions.innerHTML = `
        <button onclick="copyMessage('${msgId}')">📋</button>
        <button onclick="regenerateReply()">🔄</button>
        <button onclick="react('${msgId}', '👍')">👍</button>
        <button onclick="react('${msgId}', '👎')">👎</button>
    `;
    container.appendChild(actions);
}

function copyMessage(id) {
    const bubble = document.getElementById(id).querySelector('.bubble');
    navigator.clipboard.writeText(bubble.textContent.trim());
    alert("कॉपी हो गया! 📋");
}

async function regenerateReply() {
    if (!lastUserQuery) return;
    const typingId = "typing-regen-" + Date.now();
    showTyping(typingId);

    const reply = await getAIResponse(lastUserQuery);
    const oldMsg = document.getElementById(lastBotMsgId);
    if (oldMsg) oldMsg.remove();

    typeMessage(reply);
}

function showTyping(id) {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.id = id;
    div.className = "msg-container bot";
    div.innerHTML = `<div class="bubble">Veda सोच रहा है<span class="typing-cursor"></span></div>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function react(id, emoji) {
    alert(`आपने ${emoji} प्रतिक्रिया दी! धन्यवाद ❤️`);
}

// Other functions (toggleMenu, toggleCategory, voice input, light mode आदि)
// अपने पिछले कोड से copy करके paste कर लें।

function updateUI() {
    document.getElementById('header-user').innerHTML = `\( {userName}<br> \){vedaID}`;
}

function startVoiceInput() {
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!Speech) return alert("Voice input इस ब्राउज़र में उपलब्ध नहीं है।");
    const recog = new Speech();
    recog.lang = "hi-IN";
    recog.onresult = e => {
        document.getElementById('user-in').value = e.results[0][0].transcript;
        handleSend();
    };
    recog.start();
}

// Enter key
document.getElementById('user-in').addEventListener('keypress', e => {
    if (e.key === "Enter") handleSend();
});

</script>
</body>
</html>
