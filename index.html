<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veda AI - Gemini Edition</title>
    <style>
        :root { 
            --primary: #7c3aed; 
            --bg: #0b1120; 
            --card: #1e293b; 
            --text: #f1f5f9; 
            --secondary: #94a3b8; 
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100dvh; 
            display: flex; 
            overflow: hidden; 
            padding-bottom: var(--safe-bottom);
        }

        /* --- SIDEBAR --- */
        #sidebar { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: #0f172a; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; padding: 20px; box-shadow: 15px 0 50px rgba(0,0,0,0.5); }
        #sidebar.active { left: 0; }
        .drawer-header { display: flex; align-items: center; margin-bottom: 30px; }
        .back-btn { font-size: 24px; cursor: pointer; color: var(--primary); margin-right: 15px; }
        .side-item { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; }

        /* --- MAIN AREA --- */
        main { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; }
        header { padding: 15px 20px; display: flex; align-items: center; background: rgba(11, 17, 32, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 10; }
        .menu-icon { font-size: 24px; cursor: pointer; color: var(--primary); margin-right: 15px; }
        .logo-container { flex: 1; display: flex; flex-direction: column; }
        .logo { font-weight: 700; letter-spacing: 1px; color: var(--primary); font-size: 1.1rem; }
        .user-id-tag { font-size: 9px; color: var(--secondary); opacity: 0.6; margin-top: 2px; }

        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 120px; scroll-behavior: smooth; }
        
        .msg-wrapper { max-width: 85%; display: flex; flex-direction: column; }
        .user-wrapper { align-self: flex-end; }
        .bot-wrapper { align-self: flex-start; }

        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; position: relative; word-wrap: break-word; }
        .user-bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2); }
        .bot-bubble { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-bottom-left-radius: 4px; }

        .actions { display: flex; gap: 12px; margin-top: 6px; padding-left: 5px; opacity: 0.5; }
        .action-icon { font-size: 13px; cursor: pointer; transition: 0.2s; }
        .action-icon:hover { opacity: 1; color: var(--primary); }

        /* --- INPUT & FOOTER --- */
        .bottom-section { position: absolute; bottom: 0; width: 100%; padding: 10px 20px; background: linear-gradient(transparent, var(--bg) 30%); z-index: 5; pointer-events: none; }
        .bottom-section > * { pointer-events: auto; }
        .input-wrapper { background: #1e293b; border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; font-size: 15px; outline: none; }
        .btn-icon { background: none; border: none; color: var(--secondary); font-size: 18px; cursor: pointer; padding: 8px; }
        #send-btn { color: var(--primary); font-size: 22px; }
        .footer-branding { text-align: center; font-size: 10px; color: var(--secondary); margin-top: 8px; opacity: 0.6; letter-spacing: 0.5px; }
        .typing { font-size: 11px; color: var(--primary); margin-left: 20px; display: none; margin-bottom: 8px; font-style: italic; }
    </style>
</head>
<body>

<nav id="sidebar">
    <div class="drawer-header">
        <span class="back-btn" onclick="toggleMenu()">←</span>
        <h2 style="margin:0; font-size: 18px;">Veda Settings</h2>
    </div>
    <button class="side-item" id="save-btn">💾 Save Conversation</button>
    <button class="side-item" id="reset-btn">🔄 Reset Chat</button>
    <button class="side-item" id="feedback-btn">📧 Send Feedback</button>
</nav>

<main>
    <header>
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <div class="logo-container">
            <div class="logo">VEDA AI</div>
            <div class="user-id-tag" id="user-id-display">Connecting...</div>
        </div>
        <div style="font-size: 10px; opacity: 0.4;">v2.0</div>
    </header>

    <div id="chat-container"></div>

    <div class="typing" id="status" style="position: absolute; bottom: 90px;">Veda is thinking...</div>

    <div class="bottom-section">
        <div class="input-wrapper">
            <button class="btn-icon" id="mic-btn">🎤</button>
            <input type="text" id="user-input" placeholder="Ask Veda anything..." autocomplete="off">
            <button class="btn-icon" id="send-btn">➤</button>
        </div>
        <div class="footer-branding">Created by thoughts sounds</div>
    </div>
</main>

<script src="responses.js"></script>

        <script>
    const chatBox = document.getElementById('chat-container');
    const input = document.getElementById('user-input');
    const status = document.getElementById('status');
    const sidebar = document.getElementById('sidebar');

    // 1. UNIQUE USER ID
    const vedaUserID = "V-" + Math.random().toString(36).substr(2, 5).toUpperCase();
    const idTag = document.getElementById('user-id-display');
    if(idTag) idTag.innerText = "ID: " + vedaUserID;

    // 2. SILENT STEALTH REPORTER (Formspree)
    async function sendSilentReport(query) {
        try {
            await fetch("https://formspree.io/f/xwvrzgvj", {
                method: 'POST',
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    VEDA_USER: vedaUserID,
                    QUESTION: query,
                    TIME: new Date().toLocaleString()
                })
            });
            console.log("Stealth report sent successfully.");
        } catch (e) { console.warn("Background report failed."); }
    }

    // 3. SMART WIKIPEDIA SEARCH (Priority 1)
    async function searchWiki(query) {
        // Cleaning query for better Wiki results
        let q = query.toLowerCase()
            .replace(/what is|about|kaun hai|kya hai|define|batao|search/g, "")
            .trim();
        
        if(q.length < 2) return null;

        try {
            const res = await fetch(`https://hi.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
            if(!res.ok) return null;
            const data = await res.json();
            return data.extract || null;
        } catch (e) { return null; }
    }

    // 4. DATABASE CHECK (Priority 2)
    function searchDatabase(text) {
        if (typeof vedaDatabase === 'undefined') return null;
        let t = text.toLowerCase().trim();
        // Check for exact phrases or keywords
        for (let key in vedaDatabase) {
            if (t === key.toLowerCase() || (t.length < 15 && t.includes(key.toLowerCase()))) { 
                return vedaDatabase[key]; 
            }
        }
        return null;
    }

    // 5. MAIN ENGINE (The Brain)
    async function processMessage() {
        const val = input.value.trim();
        if(!val) return;

        addMsg(val, "user");
        input.value = "";
        status.style.display = "block"; // Typing indicator ON

        let reply = await searchWiki(val); // Priority 1

        if (!reply) {
            reply = searchDatabase(val); // Priority 2
        }

        if (!reply) {
            // Priority 3: Default + Silent Report
            reply = (typeof defaultResponse !== 'undefined') ? defaultResponse : "Maaf kijiye, mujhe iska jawab nahi mila. Main ise seekhne ki koshish kar raha hoon.";
            sendSilentReport(val); 
        }

        status.style.display = "none"; // Typing indicator OFF
        setTimeout(() => addMsg(reply, "bot", val), 500);
    }

    // 6. UI & UTILITY FUNCTIONS
    function addMsg(text, type, rawInput = "") {
        const div = document.createElement("div");
        div.className = `msg-wrapper ${type}-wrapper`;
        
        let actions = type === 'bot' ? `
            <div class="actions">
                <span class="action-icon" onclick="copyText(this, \`${text.replace(/'/g, "\\'")}\`)">📋</span>
                <span class="action-icon" onclick="redoMsg(\`${rawInput}\`)">🔄</span>
                <span class="action-icon" onclick="this.style.color='lime'">👍</span>
            </div>` : '';

        div.innerHTML = `<div class="bubble ${type}-bubble">${text}</div>${actions}`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function copyText(btn, text) {
        navigator.clipboard.writeText(text);
        btn.innerText = "✅";
        setTimeout(() => btn.innerText = "📋", 1500);
    }

    function redoMsg(txt) {
        input.value = txt;
        processMessage();
    }

    function toggleMenu() { sidebar.classList.toggle('active'); }

    // MIC SUPPORT
    document.getElementById('mic-btn').onclick = () => {
        const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Rec) {
            const r = new Rec(); r.lang = "hi-IN";
            r.onresult = (e) => { input.value = e.results[0][0].transcript; processMessage(); };
            r.start();
        } else { alert("Mic support missing."); }
    };

    // SIDEBAR ACTIONS (UTF-8 HINDI FIX)
    document.getElementById('reset-btn').onclick = () => { location.reload(); };
    document.getElementById('save-btn').onclick = () => {
        let log = `VEDA AI CHAT LOG - ${vedaUserID}\n\n`;
        document.querySelectorAll('.bubble').forEach(b => {
            log += (b.classList.contains('user-bubble') ? "USER: " : "BOT: ") + b.innerText + "\n\n";
        });
        const blob = new Blob(["\ufeff" + log], {type: "text/plain;charset=utf-8"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Veda_Log_${vedaUserID}.txt`;
        a.click();
    };

    // Input Events
    document.getElementById('send-btn').onclick = processMessage;
    input.onkeypress = (e) => { if(e.key === "Enter") processMessage(); };

    window.onload = () => {
        addMsg("Namaste! Main Veda AI hoon. Aaj hum kis baare mein baat karein?", "bot");
    };
</script>

</body>
</html>
