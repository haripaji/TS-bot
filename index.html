<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TS bot</title>
    <style>
        :root { 
            --bg: #131314; --card: #1e1f20; --primary: #8ab4f8; 
            --text: #e3e3e3; --border: #444746; --user-msg: #2b2c2d;
        }
        * { box-sizing: border-box; font-family: 'Google Sans', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- Header & Sidebars --- */
        header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: 500; }
        .user-av { width: 34px; height: 34px; background: #3c4043; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); font-size: 14px; }

        #sidebar, #user-sidebar { position: fixed; top: 0; bottom: 0; width: 280px; background: #000; border-right: 1px solid var(--border); z-index: 10001; transition: 0.3s ease; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        #sidebar { left: -280px; }
        #user-sidebar { right: -280px; border-left: 1px solid var(--border); border-right: none; }
        #sidebar.active { left: 0; }
        #user-sidebar.active { right: 0; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; display: none; }

        /* --- Gemini Input Bar --- */
        .footer { padding: 10px 15px 25px; max-width: 800px; margin: 0 auto; width: 100%; text-align: center; }
        .input-wrapper { background: var(--card); border-radius: 32px; padding: 8px 16px; display: flex; align-items: center; gap: 10px; border: 1px solid transparent; }
        .input-wrapper:focus-within { background: #282a2c; border-color: var(--border); }
        textarea { flex: 1; background: none; border: none; color: white; outline: none; resize: none; font-size: 16px; padding: 8px 0; max-height: 150px; }
        
        .cat-status { font-size: 11px; color: #9aa0a6; margin-top: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
        
        /* --- Category Menu --- */
        #cat-menu { position: absolute; bottom: 80px; left: 20px; background: #2d2e30; border: 1px solid var(--border); border-radius: 12px; display: none; flex-direction: column; z-index: 1000; overflow: hidden; }
        .cat-opt { padding: 12px 20px; cursor: pointer; font-size: 14px; transition: 0.2s; white-space: nowrap; }
        .cat-opt:hover { background: #3c4043; color: var(--primary); }

        /* --- Chat UI Fixes --- */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 25px; }
        .row { max-width: 800px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { font-size: 16px; line-height: 1.6; }
        .user-msg { align-self: flex-end; background: var(--user-msg); padding: 12px 20px; border-radius: 20px; max-width: 85%; }
        
        .toolkit { display: flex; gap: 12px; margin-top: 5px; opacity: 0.8; }
        .tool-btn { background: none; border: none; color: #9aa0a6; cursor: pointer; font-size: 16px; }
        .tool-btn:hover { color: white; }

        .btn-main { padding: 10px; background: transparent; border: 1px solid var(--border); color: white; border-radius: 8px; cursor: pointer; text-align: left; font-size: 14px; }
        .btn-main:hover { background: #1e1f20; }
    </style>
</head>
<body>

<div id="overlay" onclick="closeAll()"></div>

<div id="user-sidebar">
    <h3 style="margin-bottom:20px; color:var(--primary);">User Profile</h3>
    <div style="background:#1e1f20; padding:15px; border-radius:12px; font-size:14px;">
        <p><strong>Name:</strong> <span id="stat-name">User</span></p>
        <p style="margin-top:8px;"><strong>Status:</strong> Professional</p>
        <p style="margin-top:8px;"><strong>Total Chats:</strong> <span id="stat-chats">0</span></p>
        <p style="margin-top:8px;"><strong>Session ID:</strong> <span id="stat-id">#0000</span></p>
    </div>
    <button class="btn-main" style="margin-top:20px;" onclick="location.reload()">🔄 Refresh Session</button>
</div>

<div id="sidebar">
    <button class="btn-main" onclick="startNewChat()" style="border-style:dashed;">+ New Chat</button>
    <div style="font-size:12px; color:#444746; margin:10px 0;">RECENT</div>
    <div id="history-list" style="flex:1; overflow-y:auto;"></div>
    <button class="btn-main" onclick="saveChat()">💾 Save Current Chat</button>
    <button class="btn-main" onclick="clearHistory()" style="color:#f28b82;">🗑️ Clear History</button>
    <button class="btn-main" onclick="alert('Feedback sent to Veda Team!')">📝 Feedback</button>
</div>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <button class="tool-btn" style="font-size:22px;" onclick="toggleSidebar('sidebar')">☰</button>
        <div class="logo">TS bot <span style="color:var(--primary)">Pro</span></div>
    </div>
    <div class="user-av" id="user-trigger" onclick="toggleSidebar('user-sidebar')">U</div>
</header>

<div id="chat-box"></div>

<div id="cat-menu">
    <div class="cat-opt" onclick="setCategory('All', 'Everything')">🌐 All</div>
    <div class="cat-opt" onclick="setCategory('Study 📚✏', 'Academic Mode')">📚 Study</div>
    <div class="cat-opt" onclick="setCategory('Fun', 'Entertainment Mode')">🎭 Fun</div>
    <div class="cat-opt" onclick="setCategory('Wikipedia 🌐', 'Knowledge Base')">📖 Wikipedia</div>
    <div class="cat-opt" onclick="setCategory('Google Search 🔍', 'Live Internet')">🔍 Google Search</div>
    <div class="cat-opt" onclick="setCategory('Pro Mode', 'Hybrid Intelligence')">⚡ Pro Mode</div>
</div>

<div class="footer">
    <div class="input-wrapper">
        <button class="tool-btn" onclick="toggleCatMenu()">➕</button>
        <textarea id="user-input" placeholder="Ask Veda..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button class="tool-btn" onclick="startVoice()">🎙️</button>
        <button class="tool-btn" style="color:var(--primary);" onclick="handleSend()">➤</button>
    </div>
    <div class="cat-status" id="active-status">MODE: ALL</div>
</div>

<script>
    let currentCategory = "All";
    let chatHistory = JSON.parse(localStorage.getItem('vedaHistory')) || [];
    let userData = JSON.parse(localStorage.getItem('vedaUser')) || { name: "TS Owner", chats: 0 };

    // --- UI Controls ---
    function toggleSidebar(id) {
        document.getElementById(id).classList.toggle('active');
        document.getElementById('overlay').style.display = 'block';
        updateUserStats();
    }

    function closeAll() {
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('user-sidebar').classList.remove('active');
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('cat-menu').style.display = 'none';
    }

    function toggleCatMenu() {
        const menu = document.getElementById('cat-menu');
        menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    }

    function setCategory(cat, status) {
        currentCategory = cat;
        document.getElementById('active-status').innerText = `MODE: ${status}`;
        closeAll();
    }

    function updateUserStats() {
        document.getElementById('stat-name').innerText = userData.name;
        document.getElementById('stat-chats').innerText = chatHistory.length;
        document.getElementById('stat-id').innerText = "#V" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('user-trigger').innerText = userData.name[0];
    }

    // --- Chat Logic ---
    async function handleSend() {
        const input = document.getElementById('user-input');
        const val = input.value.trim();
        if(!val) return;

        addMsg(val, 'user');
        input.value = "";
        input.style.height = "auto";

        // Category Strict Logic
        let response = "";
        if(currentCategory === "Google Search 🔍") {
            response = `Searching internet for: ${val}... <br><iframe src="https://www.bing.com/search?q=${val}" style="width:100%; height:300px; border-radius:12px; margin-top:10px;"></iframe>`;
        } else {
            // Placeholder for your local file search logic
            response = `[${currentCategory}] ke mutabik: Aapne pucha "${val}". Main local files aur Wikipedia scan kar raha hoon...`;
        }
        
        setTimeout(() => addMsg(response, 'bot'), 600);
    }

    function addMsg(text, type) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `row ${type}-msg`;
        div.innerHTML = `<div class="msg">${text}</div>`;
        
        if(type === 'bot') {
            div.innerHTML += `
                <div class="toolkit">
                    <button class="tool-btn" onclick="speak('${text.replace(/'/g, "")}')">🔊</button>
                    <button class="tool-btn">📋</button>
                    <button class="tool-btn">☑</button>
                    <button class="tool-btn">X</button>
                </div>`;
        }
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function saveChat() {
        const session = { id: Date.now(), title: "Conversation " + (chatHistory.length + 1), content: document.getElementById('chat-box').innerHTML };
        chatHistory.unshift(session);
        localStorage.setItem('vedaHistory', JSON.stringify(chatHistory));
        alert("Chat Saved to History!");
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = chatHistory.map(h => `<div class="cat-opt" style="font-size:12px;">${h.title}</div>`).join('');
    }

    function speak(t) {
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(t);
        u.lang = 'hi-IN';
        window.speechSynthesis.speak(u);
    }

    window.onload = () => {
        updateUserStats();
        renderHistory();
        addMsg("Namaste! Koi sawal puchein.", "bot");
    };
</script>
</body>
</html>
