<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veda AI bot</title>
    <style>
        :root { --primary: #10a37f; --bg: #343541; --sidebar: #202123; --text: #ececf1; --border: rgba(255,255,255,0.1); --card: #444654; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.2s; }
        body { margin: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Header Fix & Transparent */
        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(52, 53, 65, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; z-index: 100; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .title { font-weight: 600; font-size: 1.1rem; color: var(--primary); }
        .user-info { font-size: 10px; color: #8e8ea0; text-align: right; line-height: 1.2; }

        /* Chat Area */
        #chat-box { flex: 1; overflow-y: auto; padding: 80px 15px 160px; display: flex; flex-direction: column; gap: 25px; scroll-behavior: smooth; }
        .msg-container { display: flex; flex-direction: column; gap: 8px; max-width: 95%; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; } .bot { align-self: flex-start; width: 100%; }
        .bubble { padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.6; }
        .user .bubble { background: var(--card); border: 1px solid var(--border); border-bottom-right-radius: 2px; color: white; }
        .bot .bubble { background: none; padding-left: 0; color: var(--text); }
        
        /* Action Bar (Gemini Style) */
        .action-bar { display: flex; gap: 18px; font-size: 15px; color: #8e8ea0; margin-top: 5px; padding-left: 5px; }
        .action-bar span { cursor: pointer; }
        .action-bar span:hover { color: var(--primary); }

        /* Settings Sidebar with Swipe */
        #settings-menu { position: fixed; top: 0; left: -100%; width: 80%; height: 100%; background: var(--sidebar); z-index: 200; padding: 25px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        #settings-menu.open { transform: translateX(100%); }
        .menu-btn { width: 100%; background: #2d2d39; border: none; color: white; padding: 15px; text-align: left; margin-bottom: 12px; border-radius: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 14px; }

        /* Footer & Input Bar */
        .footer { position: fixed; bottom: 0; width: 100%; background: linear-gradient(transparent, var(--bg) 30%); padding: 10px 15px 30px; z-index: 90; }
        .input-container { max-width: 800px; margin: 0 auto; background: #40414f; border-radius: 15px; display: flex; align-items: center; padding: 12px 15px; border: 1px solid var(--border); box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; padding: 0 10px; }
        .credits { font-size: 9px; color: #565869; margin-top: 10px; text-align: center; letter-spacing: 0.5px; }

        /* Category Menu */
        #cat-popup { position: fixed; bottom: 95px; left: 20px; background: var(--sidebar); border: 1px solid var(--border); border-radius: 12px; padding: 10px; display: none; z-index: 150; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .cat-item { padding: 10px 20px; cursor: pointer; border-radius: 8px; font-size: 14px; color: #ececf1; }
        .cat-item:hover { background: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button onclick="toggleMenu(true)" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">☰</button>
        <div class="title">Veda AI bot</div>
    </div>
    <div class="user-info" id="header-user">User<br>VEDA-0000</div>
</header>

<div id="chat-box"></div>

<div id="cat-popup">
    <div class="cat-item" onclick="setCat('study')">📚 Study</div>
    <div class="cat-item" onclick="setCat('anime')">⛩️ Anime</div>
    <div class="cat-item" onclick="setCat('creative')">🎨 Creative</div>
    <div class="cat-item" onclick="setCat('core')">🏠 Core</div>
    <div class="cat-item" onclick="setCat('all')">🌍 All Categories</div>
</div>

<div class="footer">
    <div class="input-container">
        <button onclick="toggleCat()" style="background:none; border:none; color:#8e8ea0; font-size:22px; cursor:pointer;">➕</button>
        <input type="text" id="user-in" placeholder="Message Veda AI...">
        <button onclick="handleSend()" style="background:none; border:none; color:var(--primary); font-size:22px; cursor:pointer;">⬆️</button>
    </div>
    <div class="credits">Created by Thoughts Sounds</div>
</div>

<div id="settings-menu">
    <h3 style="margin-top:0; color:var(--primary); font-size:1.4rem;">Veda Settings</h3>
    <button class="menu-btn" onclick="changeName()">👤 Name change</button>
    <button class="menu-btn" onclick="downloadChat()">📩 Save chat</button>
    <button class="menu-btn" onclick="deleteHistory()">🗑 Delete History</button>
    <button class="menu-btn" onclick="location.reload()">🔄 Refresh</button>
    <button class="menu-btn" onclick="alert('Feedback sent!')">📨 Feedback</button>
    
    <div id="menu-info" style="font-size:11px; color:#8e8ea0; position:absolute; bottom:25px; line-height:1.6;"></div>
</div>

<script src="core.js"></script>
<script src="study.js"></script>
<script src="anime.js"></script>
<script src="creative.js"></script>

<script>
    let chatHistory = [];
    let selectedCat = "all";
    let userName = localStorage.getItem('vedaName') || "User";
    let userID = localStorage.getItem('vedaID') || "VEDA-" + Math.floor(1000 + Math.random() * 9999);
    let vedaMemory = JSON.parse(localStorage.getItem('vedaMemory')) || {};
    localStorage.setItem('vedaID', userID);

    document.getElementById('header-user').innerHTML = `${userName}<br>${userID}`;

    // --- SWIPE TO CLOSE LOGIC ---
    let touchStartX = 0;
    const menu = document.getElementById('settings-menu');
    menu.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
    menu.addEventListener('touchmove', e => {
        let diff = touchStartX - e.touches[0].clientX;
        if (diff > 60) toggleMenu(false); 
    });

    function toggleMenu(s) {
        if(s) { menu.classList.add('open'); updateInfo(); }
        else { menu.classList.remove('open'); }
    }

    function toggleCat() { 
        let p = document.getElementById('cat-popup');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function setCat(c) { selectedCat = c; toggleCat(); alert("Category Set: " + c); }

    function addMessage(txt, sender) {
        const container = document.createElement('div');
        container.className = `msg-container ${sender}`;
        
        let actions = sender === 'bot' ? `
            <div class="action-bar">
                <span onclick="speak(\`${txt.replace(/['"`]/g, "")}\`)">🔊</span>
                <span onclick="copyText(\`${txt.replace(/['"`]/g, "")}\`)">📋</span>
                <span onclick="giveFeedback(true, this, '')">👍</span>
                <span onclick="giveFeedback(false, this, \`${txt.replace(/['"`]/g, "")}\`)">👎</span>
                <span onclick="alert('More options coming soon!')">⋮</span>
            </div>` : "";

        container.innerHTML = `<div class="bubble">${txt}</div>${actions}`;
        document.getElementById('chat-box').appendChild(container);
        document.getElementById('chat-box').scrollTop = chatBox.scrollHeight;
        chatHistory.push({s: sender, t: txt, time: new Date()});
    }

    async function handleSend() {
        const input = document.getElementById('user-in');
        const val = input.value.trim();
        if(!val) return;
        addMessage(val, 'user');
        input.value = "";
        
        let reply = await getReply(val);
        setTimeout(() => addMessage(reply, 'bot'), 500);
    }

    async function getReply(userQ) {
        let q = userQ.toLowerCase();
        
        // 1. Check Learning Memory
        if (vedaMemory[q]) return vedaMemory[q] + " (Learned)";

        // 2. Check Modular Files with Category Priority
        let dbs = { "core": typeof vedaCore !== 'undefined' ? vedaCore : {}, 
                    "study": typeof vedaStudy !== 'undefined' ? vedaStudy : {}, 
                    "anime": typeof vedaAnime !== 'undefined' ? vedaAnime : {}, 
                    "creative": typeof vedaCreative !== 'undefined' ? vedaCreative : {} };
        
        if(selectedCat !== "all" && dbs[selectedCat]) {
            for(let key in dbs[selectedCat]) if(q.includes(key)) return dbs[selectedCat][key];
        }
        
        let allDbs = [dbs.core, dbs.study, dbs.anime, dbs.creative];
        for(let db of allDbs) {
            for(let key in db) if(q.includes(key)) return db[key];
        }

        // 3. Wikipedia Search
        try {
            let res = await fetch(`https://hi.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
            let data = await res.json();
            if(data.extract) return data.extract + " (Source: Wikipedia)";
        } catch(e) {}

        return "Maaf kijiye, mujhe iski jankari nahi mili. Kya aap mujhe sikha sakte hain? (👎 dabakar sahi jawab likhein)";
    }

    function speak(t) { 
        window.speechSynthesis.cancel();
        let s = new SpeechSynthesisUtterance(t); s.lang = 'hi-IN';
        window.speechSynthesis.speak(s);
    }

    function copyText(t) { navigator.clipboard.writeText(t); alert("Copied!"); }

    function giveFeedback(isGood, el, botTxt) {
        el.style.color = isGood ? "#10a37f" : "#ef4444";
        if(!isGood) {
            let q = prompt("Iska sahi jawab kya hona chahiye tha?");
            if(q) {
                // Learning logic: Hum user ki last chat ko question maan rahe hain
                let lastUserMsg = chatHistory.filter(m => m.s === 'user').pop();
                if(lastUserMsg) {
                    vedaMemory[lastUserMsg.t.toLowerCase()] = q;
                    localStorage.setItem('vedaMemory', JSON.stringify(vedaMemory));
                    alert("Shukriya! Maine seekh liya.");
                }
            }
        }
    }

    function changeName() {
        let n = prompt("Naya naam:", userName);
        if(n) { localStorage.setItem('vedaName', n); location.reload(); }
    }

    function deleteHistory() {
        if(chatHistory.length === 0) return alert("No cache");
        if(confirm("Sari history delete karein?")) { chatHistory = []; document.getElementById('chat-box').innerHTML = ""; alert("History Deleted"); }
    }

    function downloadChat() {
        let log = chatHistory.map(m => `${m.s.toUpperCase()}: ${m.t}`).join('\n');
        let blob = new Blob([`VEDA LOG\nID: ${userID}\nName: ${userName}\n\n${log}`], {type:'text/plain'});
        let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `Veda_Chat_${userID}.txt`; a.click();
    }

    function updateInfo() {
        const d = new Date();
        document.getElementById('menu-info').innerHTML = `
            Version: 1.0.0 (Stable)<br>
            Date: ${d.toLocaleDateString()}<br>
            Time: ${d.toLocaleTimeString()}<br>
            Cache: ${chatHistory.length ? chatHistory.length + " msgs" : "No cache"}<br><br>
            Thanks for using Veda AI!
        `;
    }

    document.getElementById('user-in').onkeydown = e => { if(e.key === "Enter") handleSend(); };
    window.onload = () => addMessage("Namaste! Main Veda AI hoon. Aaj main aapki kaise madad kar sakta hoon?", "bot");
</script>
</body>
</html>
