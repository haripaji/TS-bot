<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veda AI</title>
    
    <script src="core.js"></script>
    <script src="study.js"></script>
    <script src="anime.js"></script>
    <script src="responses.js"></script> 
    <script src="about.js"></script>
    
    <style>
        :root { --primary: #10a37f; --bg: #343541; --sidebar: #202123; --text: #ececf1; --border: rgba(255,255,255,0.1); --card: #444654; --advance-neon: #ff0055; }
        .light-mode { --bg: #f7f7f8; --text: #202123; --sidebar: #ffffff; --card: #e5e5e5; --border: rgba(0,0,0,0.1); }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); overflow: hidden; display: flex; flex-direction: column; transition: 0.4s ease; }

        /* Login Overlay */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--sidebar); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid var(--border); width: 90%; max-width: 350px; }

        /* Header & Chat Area */
        header { width: 100%; height: 60px; background: rgba(52, 53, 65, 0.95); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; z-index: 100; justify-content: space-between; flex-shrink: 0; }
        .title { font-weight: 600; font-size: 1.2rem; color: var(--primary); letter-spacing: 1px; transition: 0.3s; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        
        .msg-container { display: flex; flex-direction: column; gap: 8px; max-width: 90%; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; } 
        .bot { align-self: flex-start; width: 100%; }
        .bubble { padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.6; word-wrap: break-word; }
        .user .bubble { background: var(--card); border: 1px solid var(--border); border-bottom-right-radius: 2px; }
        .bot .bubble { background: none; padding-left: 0; color: inherit; opacity: 0.9; }
        
        /* Settings & Popups */
        #settings-menu { position: fixed; top: 0; left: -100%; width: 85%; max-width: 300px; height: 100%; background: var(--sidebar); z-index: 1001; padding: 25px; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        #settings-menu.open { left: 0; }
        #category-popup { display: none; position: fixed; bottom: 80px; left: 15px; background: var(--sidebar); border: 1px solid var(--border); border-radius: 18px; padding: 15px; z-index: 150; width: 230px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        
        .menu-btn { width: 100%; background: #2d2d39; border: none; color: white; padding: 12px; text-align: left; margin-bottom: 8px; border-radius: 10px; cursor: pointer; font-size: 14px; }
        .advance-active { background: #0b0d11 !important; }
        .advance-active .title { color: var(--advance-neon); text-shadow: 0 0 10px var(--advance-neon); }

        .footer { width: 100%; padding: 10px 15px 25px; background: var(--bg); flex-shrink: 0; }
        .input-container { max-width: 800px; margin: 0 auto; background: #40414f; border-radius: 15px; display: flex; align-items: center; padding: 8px 15px; border: 1px solid var(--border); }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onclick="closeAll()">

<div id="login-overlay">
    <div class="login-card">
        <h2 style="color:var(--primary); margin-bottom:10px;">Veda AI Login</h2>
        <input type="text" id="user-name-in" placeholder="Apna naam likhein..." style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:white; margin-bottom:15px;">
        <button onclick="doLogin()" style="width:100%; padding:12px; background:var(--primary); border:none; color:white; border-radius:8px; font-weight:bold; cursor:pointer;">Start Veda</button>
    </div>
</div>

<div id="menu-overlay" onclick="toggleMenu(false)"></div>

<header>
    <button onclick="event.stopPropagation(); toggleMenu(true)" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">☰</button>
    <div class="title" id="veda-title">VEDA AI</div>
    <div id="header-user" style="font-size:10px; color:#8e8ea0; text-align:right;">User<br>VEDA-0000</div>
</header>

<div id="chat-box"></div>

<div id="category-popup" onclick="event.stopPropagation()">
    <p style="font-size: 11px; color: #8e8ea0; margin-bottom: 10px; padding-left: 5px;">SELECT MODE</p>
    <button class="menu-btn" onclick="setMode('Auto')">✨ Auto Mode</button>
    <button class="menu-btn" onclick="setMode('Study')">📚 Study Mode</button>
    <button class="menu-btn" onclick="setMode('Anime')">⛩️ Anime Fan</button>
    <button class="menu-btn" onclick="setMode('Wikipedia')">🌐 Wikipedia Only</button>
    
    <div style="border-top: 1px solid var(--border); margin-top: 10px; padding-top: 12px;">
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--advance-neon); font-weight: bold; font-size: 13px;">
            <input type="checkbox" id="advanceModeToggle" onchange="toggleAdvanceTheme()" style="width: 16px; height: 16px; accent-color: var(--advance-neon);">
            🚀 ACTIVATE VEDA PRO (LLM)
        </label>
    </div>
</div>

<div id="settings-menu" onclick="event.stopPropagation()">
    <h3 style="color:var(--primary); margin-bottom:20px;">Settings</h3>
    <button class="menu-btn" onclick="toggleLightMode()">🌓 Toggle Theme</button>
    <button class="menu-btn" onclick="sendFeedback()">⭐ Send Feedback</button>
    <div style="background: #1a1b1e; padding: 15px; border-radius: 12px; text-align: center; margin: 15px 0;">
        <div id="live-time" style="font-size: 1.5rem; font-weight: bold; color: var(--primary);">00:00:00</div>
    </div>
    <button class="menu-btn" onclick="exportLearnedData()">🚀 Export responses.js</button>
    <button class="menu-btn" onclick="downloadChat()">📥 Download Chat</button>
    <button class="menu-btn" onclick="clearBrain()" style="color:#ef4444;">🧠 Reset Memory</button>
</div>

<div class="footer">
    <div class="input-container">
        <button onclick="event.stopPropagation(); toggleCategory()" style="background:none; border:none; color:#8e8ea0; font-size:24px; margin-right:12px; cursor:pointer;">➕</button>
        <input type="text" id="user-in" placeholder="Ask Veda anything..." autocomplete="off">
        <button onclick="handleSend()" style="background:none; border:none; color:var(--primary); font-size:24px; cursor:pointer;">⬆️</button>
    </div>   
    <div style="text-align: center; font-size: 10px; margin-top: 12px; color: #8e8ea0;">Created by Thoughts Sounds</div>
</div>

<script>
    // --- GLOBAL VARIABLES ---
    let vedaMemory = JSON.parse(localStorage.getItem('vedaMemory')) || {};
    let learningMode = { active: false, question: "" };
    let currentMode = "Auto";
    let chatLog = []; 
    let userName = localStorage.getItem('vedaUserName') || "User";
    const vedaID = localStorage.getItem('vedaUserID') || "VEDA-" + Math.floor(1000 + Math.random() * 9000);
    
    // --- API CONFIG ---
    const VERCEL_LLM_URL = "https://veda-brain-q1ju.vercel.app/ask";
    const FORMSPREE_REPORT = "https://formspree.io/f/YOUR_ID"; // Apni ID yahan dalein

    window.onload = () => { 
        startClock(); 
        if(localStorage.getItem('vedaUserName')) {
            document.getElementById('login-overlay').style.display = 'none';
            updateUI();
        }
    };

    function doLogin() {
        const name = document.getElementById('user-name-in').value.trim();
        if(!name) return alert("Naam likhna zaroori hai!");
        userName = name;
        localStorage.setItem('vedaUserName', name);
        localStorage.setItem('vedaUserID', vedaID);
        document.getElementById('login-overlay').style.display = 'none';
        updateUI();
        addMessage(`Namaste ${userName}! Main Veda AI Pro hoon. Aaj main aapki kaise madad karoon?`, "bot");
    }

    function toggleLightMode() { document.body.classList.toggle('light-mode'); }

    function sendFeedback() {
        let f = prompt("Aapka anubhav kaisa raha? (1-5 star):");
        if(f) reportToFormspree("FEEDBACK", f);
    }

    async function reportToFormspree(type, detail) {
        try {
            fetch(FORMSPREE_REPORT, {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ user: userName, type: type, detail: detail, date: new Date().toLocaleString() })
            });
        } catch(e) {}
    }

    // --- CORE LOGIC UPGRADE ---
    async function processLogic(q) {
        const query = q.toLowerCase().trim();
        const isAdv = document.getElementById('advanceModeToggle').checked;

        // HAR NEW QUESTION REPORT KARNA
        reportToFormspree("QUESTION", q);

        // 1. Learning Fallback
        if (learningMode.active) {
            vedaMemory[learningMode.question] = q;
            localStorage.setItem('vedaMemory', JSON.stringify(vedaMemory));
            learningMode.active = false;
            return "Dhanyawad! Maine ise save kar liya hai. 😊";
        }

        // 2. VEDA PRO (VERCEL LLM) - NEW FEATURE
        if (isAdv) {
            try {
                const res = await fetch(VERCEL_LLM_URL, {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({ query: `[Mode: ${currentMode}] ${q}`, user: userName })
                });
                const data = await res.json();
                return data.reply;
            } catch(e) { return "Vercel Server se connection nahi ho paya. 🌐❌"; }
        }

        // 3. Purana Logic (Wikipedia, Local DB, Math)
        if (currentMode === "Wikipedia") return await fetchWiki(query) || "No wiki found.";
        
        const db = { ...window.vedaCore, ...window.vedaStudy, ...window.vedaAnime, ...window.vedaLearned, ...vedaMemory };
        if (db[query]) return db[query];

        const wiki = await fetchWiki(query);
        if (wiki) return wiki;

        learningMode.active = true;
        learningMode.question = query;
        return `Mujhe iska jawab nahi pata. Kya aap mujhe sikha sakte hain?`;
    }

    // --- DOM HELPERS (UNTOUCHED) ---
    function startClock() {
        setInterval(() => {
            document.getElementById('live-time').innerText = new Date().toLocaleTimeString('en-GB');
            document.getElementById('live-date').innerText = new Date().toLocaleDateString('hi-IN', {day:'numeric', month:'long', year:'numeric'});
        }, 1000);
    }

    function toggleAdvanceTheme() {
        const isAdv = document.getElementById('advanceModeToggle').checked;
        document.body.classList.toggle('advance-active', isAdv);
        document.getElementById('veda-title').innerText = isAdv ? "VEDA PRO 🚀" : "VEDA AI";
    }

    function toggleMenu(s) { 
        document.getElementById('settings-menu').classList.toggle('open', s);
        document.getElementById('menu-overlay').style.display = s ? 'block' : 'none';
    }

    function toggleCategory() {
        const p = document.getElementById('category-popup');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    function closeAll() { 
        document.getElementById('category-popup').style.display = 'none'; 
        toggleMenu(false);
    }

    function setMode(m) { 
        currentMode = m; 
        addMessage(`Mode switched to: *${m}*`, "bot"); 
        toggleCategory(); 
    }

    async function handleSend() {
        const inp = document.getElementById('user-in');
        const val = inp.value.trim();
        if(!val) return;
        addMessage(val, 'user');
        inp.value = "";
        
        const tId = "think-" + Date.now();
        addMessage("Veda is thinking...", "bot", tId);
        const reply = await processLogic(val);
        document.getElementById(tId).innerHTML = `<div class="bubble">${reply}</div>`;
    }

    async function fetchWiki(query) {
        try {
            const res = await fetch(`https://hi.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
            const data = await res.json();
            return data.extract ? data.extract : null;
        } catch(e) { return null; }
    }

    function addMessage(txt, sender, id = null) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg-container ${sender}`;
        if(id) div.id = id;
        div.innerHTML = `<div class="bubble">${txt}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        chatLog.push(`${sender.toUpperCase()}: ${txt}`);
        return div;
    }

    function clearBrain() { if(confirm("Reset Memory?")) { localStorage.clear(); location.reload(); } }
    function updateUI() { document.getElementById('header-user').innerHTML = `${userName}<br>${vedaID}`; }
    document.getElementById('user-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
</script>
</body>
</html>
