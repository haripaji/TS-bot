<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veda AI Pro - Dashboard</title>
    
    <!-- External JS Fallbacks -->
    <script>
        window.vedaCore = window.vedaCore || {}; 
        window.vedaStudy = window.vedaStudy || {}; 
        window.vedaAnime = window.vedaAnime || {}; 
        window.vedaResponses = window.vedaResponses || {};
    </script>
    <script src="core.js" onerror="console.log('File not found')"></script>
    <script src="study.js" onerror="console.log('File not found')"></script>
    <script src="anime.js" onerror="console.log('File not found')"></script>
    <script src="responses.js" onerror="console.log('File not found')"></script>

    <style>
        :root { 
            --primary: #10a37f; --bg: #343541; --sidebar: #202123; 
            --text: #ececf1; --border: rgba(255,255,255,0.1); --card: #444654; 
            --user-msg: #40414f; --hover: rgba(255,255,255,0.05); --pro: #ff0055;
        }
        .light-mode { 
            --bg: #f7f7f8; --text: #202123; --sidebar: #ffffff; 
            --card: #e5e5e5; --border: rgba(0,0,0,0.1); --user-msg: #ffffff; 
            --hover: rgba(0,0,0,0.05);
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }

        /* Login Screen */
        #login-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(32, 33, 35, 0.9); padding: 40px 30px; border-radius: 25px; text-align: center; border: 1px solid var(--border); width: 92%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(15px); }
        .login-card h2 { background: linear-gradient(45deg, #10a37f, #00ffcc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; font-size: 2.2rem; font-weight: 800; }
        .login-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.1); color: white; margin: 15px 0; text-align: center; outline: none; font-size: 16px; }
        .login-btn { width: 100%; padding: 15px; background: var(--primary); border: none; color: white; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Header & Profile Status */
        header { width: 100%; height: 65px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; flex-shrink: 0; z-index: 10; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .profile-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 6px 12px; border-radius: 30px; background: var(--hover); border: 1px solid var(--border); }
        .status-dot { width: 8px; height: 8px; background: #10a37f; border-radius: 50%; box-shadow: 0 0 8px #10a37f; }
        .nav-avatar { width: 32px; height: 32px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 13px; }

        /* Sidebar Settings */
        #settings-menu { position: fixed; top: 0; left: -100%; width: 85%; max-width: 320px; height: 100%; background: var(--sidebar); z-index: 3000; transition: 0.4s; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #settings-menu.open { left: 0; }
        #menu-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2500; backdrop-filter: blur(2px); }
        .account-card { padding: 20px; border-bottom: 1px solid var(--border); background: var(--hover); margin: 15px; border-radius: 15px; }

        /* Chat UI */
        #chat-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding-bottom: 20px; }
        .row { width: 100%; padding: 20px 15px; display: flex; gap: 15px; border-bottom: 1px solid rgba(0,0,0,0.02); }
        .row.bot { background: var(--card); }
        .avatar { width: 34px; height: 34px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .user .avatar { background: #5436da; }
        .bot .avatar { background: var(--primary); }
        .content { flex: 1; font-size: 15px; line-height: 1.6; }

        /* Footer & Input */
        .footer { width: 100%; padding: 15px; background: var(--bg); }
        .input-container { max-width: 800px; margin: 0 auto; background: var(--user-msg); border-radius: 15px; display: flex; align-items: flex-end; padding: 10px 15px; border: 1px solid var(--border); }
        textarea { flex: 1; background: none; border: none; color: var(--text); outline: none; font-size: 16px; resize: none; max-height: 150px; padding: 5px; }
        .ui-btn { background: none; border: none; color: #8e8ea0; font-size: 20px; cursor: pointer; padding: 5px; }

        #category-popup { display: none; position: fixed; bottom: 85px; left: 20px; background: var(--sidebar); border: 1px solid var(--border); border-radius: 16px; padding: 12px; z-index: 1500; width: 220px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .cat-btn { width: 100%; background: var(--hover); border: none; color: var(--text); padding: 10px; text-align: left; margin-bottom: 6px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .pro-badge { background: gold; color: black; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 900; }
    </style>
</head>
<body onclick="closeAll()">

<div id="login-overlay">
    <div class="login-card">
        <h2>VEDA AI PRO</h2>
        <p style="color: #8e8ea0; font-size: 13px;">Login to your Veda Account</p>
        <input type="text" id="user-name-in" class="login-input" placeholder="Enter Full Name">
        <button onclick="doLogin()" class="login-btn">Sign Up & Launch</button>
    </div>
</div>

<div id="menu-overlay" onclick="toggleMenu(false)"></div>
<div id="settings-menu" onclick="event.stopPropagation()">
    <div class="account-card">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div id="menu-avatar" class="nav-avatar" style="width: 45px; height: 45px; font-size: 18px;">U</div>
            <div>
                <div id="menu-user-name" style="font-weight: bold;">User Name</div>
                <div id="user-email" style="font-size: 11px; color: #8e8ea0;">user@veda.ai</div>
            </div>
        </div>
        <div style="margin-top: 15px; display: flex; justify-content: space-between; font-size: 12px;">
            <span>Status: <b style="color: #10a37f;">Online</b></span>
            <span id="badge-pro" class="pro-badge" style="display:none;">PRO MEMBER</span>
        </div>
    </div>
    
    <div style="padding: 0 20px;">
        <button class="cat-btn" onclick="toggleLightMode()">🌓 Switch Theme</button>
        <button class="cat-btn" onclick="downloadChat()">📥 Export History</button>
        <button class="cat-btn" onclick="clearBrain()" style="color: #ff4444;">🚪 Logout / Reset</button>
    </div>
</div>

<header>
    <div class="header-left">
        <button class="ui-btn" onclick="event.stopPropagation(); toggleMenu(true)" style="color:var(--text)">☰</button>
        <div class="title" id="veda-title" style="font-weight: 800; letter-spacing: 1px; font-size: 15px;">VEDA AI PRO</div>
    </div>
    
    <div class="profile-trigger" onclick="event.stopPropagation(); toggleMenu(true)">
        <div class="status-dot"></div>
        <div style="text-align: right;">
            <div id="header-user-name" style="font-size: 11px; font-weight: bold;">Guest</div>
            <div id="user-plan-tag" style="font-size: 9px; color: var(--primary); font-weight: bold;">Free Account</div>
        </div>
        <div id="nav-avatar" class="nav-avatar">G</div>
    </div>
</header>

<div id="chat-box"></div>

<div id="category-popup" onclick="event.stopPropagation()">
    <p style="font-size: 11px; color: #8e8ea0; margin-bottom: 10px; padding-left: 5px;">AI CAPABILITIES</p>
    <button class="cat-btn" onclick="setMode('Auto')">🤖 Auto Logic</button>
    <button class="cat-btn" onclick="setMode('Image')">🎨 Image Generation</button>
    <hr style="opacity: 0.1; margin: 10px 0;">
    <label style="display: flex; align-items: center; justify-content: space-between; padding: 5px; cursor: pointer;">
        <span style="font-size: 13px; color: var(--pro); font-weight: bold;">🚀 PRO LLM</span>
        <input type="checkbox" id="advanceModeToggle" onchange="toggleAdvanceTheme()">
    </label>
</div>

<div class="footer">
    <div class="input-container">
        <button class="ui-btn" onclick="event.stopPropagation(); toggleCategory()">➕</button>
        <textarea id="user-in" placeholder="Ask Veda anything..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button class="ui-btn" style="color:var(--primary)" onclick="handleSend()">⬆</button>
    </div>
</div>

<script>
let userName = localStorage.getItem('vedaUserName') || "User";
let currentMode = "Auto";

function doLogin() {
    const val = document.getElementById('user-name-in').value.trim();
    if(val) {
        userName = val;
        localStorage.setItem('vedaUserName', val);
        document.getElementById('login-overlay').style.display = 'none';
        updateUI();
        addMsg(`Welcome **${userName}**! Your Veda AI dashboard is ready.`, 'bot');
    }
}

if(localStorage.getItem('vedaUserName')) {
    document.getElementById('login-overlay').style.display = 'none';
    updateUI();
}

function updateUI() {
    const isPro = document.getElementById('advanceModeToggle').checked;
    
    // Update Header
    document.getElementById('header-user-name').innerText = userName;
    document.getElementById('nav-avatar').innerText = userName[0].toUpperCase();
    
    // Update Sidebar
    document.getElementById('menu-user-name').innerText = userName;
    document.getElementById('menu-avatar').innerText = userName[0].toUpperCase();
    document.getElementById('user-email').innerText = userName.toLowerCase().replace(/\s/g, '') + "@veda.ai";
    
    // Plan Updates
    const planTag = document.getElementById('user-plan-tag');
    const badge = document.getElementById('badge-pro');
    if(isPro) {
        planTag.innerText = "PRO PLAN 🚀";
        planTag.style.color = "var(--pro)";
        badge.style.display = "block";
    } else {
        planTag.innerText = "FREE ACCOUNT";
        planTag.style.color = "var(--primary)";
        badge.style.display = "none";
    }
}

async function processLogic(q) {
    const query = q.toLowerCase().trim();
    const isAdv = document.getElementById('advanceModeToggle').checked;

    // Database search
    const db = { 
        ...(window.vedaCore || {}), ...(window.vedaStudy || {}), 
        ...(window.vedaAnime || {}), ...(window.vedaResponses || {}),
        ...(JSON.parse(localStorage.getItem('vedaMemory')) || {})
    };
    if(db[query]) return db[query];

    // Image Generation
    if(query.includes("image") || query.includes("photo") || query.includes("dikhao") || currentMode === 'Image') {
        let p = query.replace(/image|dikhao|photo|banao/g, "").trim() || "modern ai city";
        return `Nayi image generate ho rahi hai: <br><img src="https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?width=500&height=500&nologo=true" style="width:100%; border-radius:12px; margin-top:10px; border: 1px solid var(--border);">`;
    }

    // Pro API Call
    if(isAdv) {
        try {
            const res = await fetch("https://veda-brain-q1ju.vercel.app/ask", {
                method: "POST", headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ query: q, user: userName })
            });
            const data = await res.json();
            if(data.reply) return data.reply;
        } catch(e) { return "Pro Engine connects to Vercel. Please check network."; }
    }

    // Default Web Search
    const searchUrl = `https://www.bing.com/search?q=${encodeURIComponent(q)}`;
    return `Searching live for you... <br><div style="width:100%; height:300px; border-radius:10px; overflow:hidden; border:1px solid var(--border); margin-top:10px;">
        <iframe src="${searchUrl}" style="width:100%; height:100%; border:none;"></iframe></div>`;
}

async function handleSend() {
    const inp = document.getElementById('user-in');
    const val = inp.value.trim();
    if(!val) return;
    
    addMsg(val, 'user');
    inp.value = "";
    inp.style.height = "auto";

    const botId = "bot-" + Date.now();
    addMsg("Veda is processing...", "bot", botId);
    
    const reply = await processLogic(val);
    document.getElementById(botId).querySelector('.content').innerHTML = reply;
}

function addMsg(txt, role, id=null) {
    const box = document.getElementById('chat-box');
    const row = document.createElement('div');
    row.className = `row ${role}`;
    if(id) row.id = id;
    row.innerHTML = `<div class="avatar">${role==='user'?'👤':'V'}</div><div class="content">${txt}</div>`;
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
}

function toggleMenu(s) { document.getElementById('settings-menu').classList.toggle('open', s); document.getElementById('menu-overlay').style.display = s?'block':'none'; }
function toggleCategory() { const p = document.getElementById('category-popup'); p.style.display = p.style.display==='block'?'none':'block'; }
function closeAll() { document.getElementById('category-popup').style.display = 'none'; toggleMenu(false); }
function setMode(m) { currentMode = m; addMsg(`Switching to **${m}** mode.`, 'bot'); closeAll(); }
function toggleLightMode() { document.body.classList.toggle('light-mode'); }
function toggleAdvanceTheme() { toggleAdvanceThemeLogic(); }
function toggleAdvanceThemeLogic() {
    const isAdv = document.getElementById('advanceModeToggle').checked; 
    document.getElementById('veda-title').innerText = isAdv ? "VEDA PRO 🚀" : "VEDA AI PRO"; 
    updateUI();
}
function clearBrain() { if(confirm("Logout and delete all data?")) { localStorage.clear(); location.reload(); } }
function downloadChat() { 
    let t = "--- VEDA AI CHAT HISTORY ---\n\n";
    document.querySelectorAll('.row').forEach(r => t += r.innerText + "\n\n");
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([t], {type:'text/plain'})); a.download = "veda-history.txt"; a.click();
}
</script>
</body>
</html>
