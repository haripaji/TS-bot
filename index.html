<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veda AI Chatbot</title>
    <style>
        :root { 
            --primary: #7c3aed; --bg: #0b1120; --card: #1e293b; 
            --text: #f1f5f9; --secondary: #94a3b8; --border: rgba(255,255,255,0.1);
        }
        .light-mode {
            --bg: #f1f5f9; --card: #ffffff; --text: #0f172a;
            --secondary: #64748b; --border: rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100dvh; display: flex; overflow: hidden; }
        
        /* Sidebar Smooth Slide */
        #sidebar { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: #0f172a; z-index: 1000; padding: 25px; box-shadow: 20px 0 50px rgba(0,0,0,0.5); color: white; transition: 0.4s; }
        #sidebar.active { left: 0; }
        .side-item { width: 100%; padding: 14px; margin-bottom: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 12px; }

        main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
        header { padding: 15px 20px; display: flex; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); }
        .menu-btn { font-size: 24px; cursor: pointer; color: var(--primary); margin-right: 15px; }
        .logo-text { font-weight: 800; color: var(--primary); font-size: 1.2rem; flex: 1; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; scroll-behavior: smooth; }
        .msg { max-width: 85%; display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user { align-self: flex-end; }
        .bot { align-self: flex-start; }
        .bubble { padding: 12px 18px; border-radius: 20px; font-size: 15px; line-height: 1.6; word-wrap: break-word; }
        .user .bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .bot .bubble { background: var(--card); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        
        /* Suggestions Panel */
        #suggestion-panel { position: absolute; bottom: -200px; width: 100%; background: var(--card); border-top: 2px solid var(--primary); border-radius: 25px 25px 0 0; padding: 20px; z-index: 50; transition: 0.4s ease; display: flex; flex-wrap: wrap; gap: 10px; box-shadow: 0 -10px 30px rgba(0,0,0,0.3); }
        #suggestion-panel.open { bottom: 85px; }
        .suggest-btn { background: rgba(124, 58, 237, 0.1); border: 1px solid var(--primary); color: var(--text); padding: 8px 15px; border-radius: 20px; font-size: 13px; cursor: pointer; }

        .input-area { position: absolute; bottom: 0; width: 100%; padding: 15px 20px; background: var(--bg); z-index: 60; }
        .input-container { background: var(--card); border-radius: 50px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid var(--border); }
        input { flex: 1; background: none; border: none; color: var(--text); padding: 12px; outline: none; font-size: 16px; }
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--secondary); padding: 5px; }
        #send-btn { color: var(--primary); font-size: 24px; }
        #plus-btn.active { transform: rotate(45deg); color: var(--primary); }

        .typing-bubble { display: none; align-self: flex-start; background: var(--card); padding: 10px 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 10px; }
        .dot { height: 8px; width: 8px; background: var(--primary); border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

<nav id="sidebar">
    <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
        <h3 style="margin:0">Veda Assistant</h3>
        <span onclick="toggleMenu()" style="cursor:pointer; font-size:24px;">✕</span>
    </div>
    <button class="side-item" id="theme-toggle">🌓 Switch Appearance</button>
    <button class="side-item" onclick="saveChat()">💾 Save Chat Log</button>
    <button class="side-item" onclick="clearChat()">🗑️ Clear Conversation</button>
    <button class="side-item" onclick="updateName()">👤 Change My Name</button>
</nav>

<div id="suggestion-panel">
    <button class="suggest-btn" onclick="quickAsk('Economics Notes')">📈 Economics</button>
    <button class="suggest-btn" onclick="quickAsk('Aryan kaun hai?')">🧒 Aryan Story</button>
    <button class="suggest-btn" onclick="quickAsk('Alya Russian')">🇷🇺 Alya Anime</button>
    <button class="suggest-btn" onclick="quickAsk('Math solve karo')">➕ Calculator</button>
    <button class="suggest-btn" onclick="quickAsk('Joke sunao')">😂 Joke</button>
</div>

<main>
    <header>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="logo-text">VEDA AI</div>
        <div style="font-size:10px; color:var(--secondary)" id="user-display">Namaste!</div>
    </header>
    <div id="chat-box"></div>
    <div class="typing-bubble" id="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="input-area">
        <div class="input-container">
            <button class="icon-btn" id="plus-btn" onclick="toggleSuggestions()">➕</button>
            <input type="text" id="user-in" placeholder="Yahan likhein..." autocomplete="off">
            <button class="icon-btn" id="send-btn">➤</button>
        </div>
    </div>
</main>

<script src="responses.js"></script>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-in');
    const loader = document.getElementById('loader');
    const panel = document.getElementById('suggestion-panel');
    const plusBtn = document.getElementById('plus-btn');
    let lastQuery = ""; 

    // --- USER RECOGNITION SYSTEM ---
    let userName = localStorage.getItem('veda_user_name');
    const uid = localStorage.getItem('veda_uid') || "V-" + Math.random().toString(36).slice(2,7).toUpperCase();
    localStorage.setItem('veda_uid', uid);

    function checkUser() {
        if (!userName) {
            let name = prompt("Namaste! Veda AI mein aapka swagat hai. Aapka naam kya hai?");
            if (name) {
                userName = name.trim();
                localStorage.setItem('veda_user_name', userName);
            } else {
                userName = "Dost";
            }
        }
        document.getElementById('user-display').innerText = "Namaste, " + userName;
    }

    function updateName() {
        let n = prompt("Naya naam likhein:");
        if(n) { userName = n; localStorage.setItem('veda_user_name', n); checkUser(); toggleMenu(); }
    }

    // --- SUGGESTIONS UI ---
    function toggleSuggestions() {
        panel.classList.toggle('open');
        plusBtn.classList.toggle('active');
    }

    function quickAsk(txt) {
        userInput.value = txt;
        handleSend();
        toggleSuggestions();
    }

    // --- AUTOMATIC REPORT SYSTEM ---
    async function reportMissing(query) {
        fetch("https://formspree.io/f/xwvrzgvj", {
            method: 'POST',
            headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
            body: JSON.stringify({ User: userName, ID: uid, MissingQuestion: query })
        });
    }

    // --- BOT LOGIC ---
    async function getBotReply(msg) {
        let q = msg.toLowerCase().trim();

        // 1. Math Calculator
        let mathQ = q.replace(/x/g, '*').replace(/plus/g, '+').replace(/minus/g, '-');
        let mMatch = mathQ.match(/[0-9\+\-\*\/\.\%]+/g);
        if (mMatch && (mathQ.includes('+') || mathQ.includes('-') || mathQ.includes('*') || mathQ.includes('/'))) {
            try { return `Hisaab: <b>${eval(mMatch.join(""))}</b>`; } catch(e){}
        }

        // 2. Personalization
        if(q.includes("mera naam")) return `Aapka naam ${userName} hai, maine yaad rakha hai!`;

        // 3. Database & FastChat
        if (typeof vedaDatabase !== 'undefined') {
            for (let k in vedaDatabase) {
                if (q.includes(k.toLowerCase())) return vedaDatabase[k];
            }
        }

        // 4. Wikipedia
        let topic = q.replace(/kya hai|batao|define/g, "").trim();
        if(topic.length > 3) {
            try {
                let r = await fetch(`https://hi.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(topic)}`);
                let d = await r.json();
                if (d.extract) return d.extract;
            } catch(e){}
        }

        // 5. Smart Fallback + Report
        if (q === lastQuery) {
            let gLink = `https://www.google.com/search?q=${encodeURIComponent(q)}`;
            return `Mujhe abhi bhi nahi mila. Search: <a href="${gLink}" target="_blank">Google</a>`;
        } else {
            lastQuery = q;
            reportMissing(q); // Silent report to developer
            return "Maaf kijiye " + userName + ", mujhe iska sahi jawab nahi mila. Maine ye sawal apne developer ko bhej diya hai taaki main ise seekh sakun.";
        }
    }

    // --- CORE UI ---
    function addMessage(text, sender) {
        const wrap = document.createElement('div');
        wrap.className = `msg ${sender}`;
        wrap.innerHTML = `<div class="bubble">${text}</div>`;
        chatBox.appendChild(wrap);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if(!text) return;
        addMessage(text, 'user');
        userInput.value = "";
        loader.style.display = "block";
        const reply = await getBotReply(text);
        loader.style.display = "none";
        setTimeout(() => addMessage(reply, 'bot'), 300);
    }

    function toggleMenu() { sidebar.classList.toggle('active'); }
    function saveChat() { /* Same as before */ }
    function clearChat() { if(confirm("Clear?")) { chatBox.innerHTML = ""; addMessage("Reset!", "bot"); } }

    document.getElementById('send-btn').onclick = handleSend;
    userInput.onkeydown = (e) => { if(e.key === "Enter") handleSend(); };
    window.onload = () => {
        checkUser();
        addMessage(`Namaste ${userName}! Main Veda AI hoon. Aaj kaise madad karun?`, "bot");
    };
</script>
</body>
</html>
