<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veda AI bot</title>
    <style>
        :root { --primary: #10a37f; --bg: #343541; --sidebar: #202123; --text: #ececf1; --border: rgba(255,255,255,0.1); --card: #444654; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); overflow: hidden; display: flex; flex-direction: column; }

        header { width: 100%; height: 60px; background: rgba(52, 53, 65, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; z-index: 100; justify-content: space-between; flex-shrink: 0; }
        .title { font-weight: 600; font-size: 1.1rem; color: var(--primary); }
        .user-info { font-size: 10px; color: #8e8ea0; text-align: right; line-height: 1.2; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .msg-container { display: flex; flex-direction: column; gap: 8px; max-width: 95%; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; } 
        .bot { align-self: flex-start; width: 100%; }
        .bubble { padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.6; word-wrap: break-word; }
        .user .bubble { background: var(--card); border: 1px solid var(--border); border-bottom-right-radius: 2px; }
        .bot .bubble { background: none; padding-left: 0; }
        
        .action-bar { display: flex; gap: 18px; font-size: 15px; color: #8e8ea0; margin-top: 5px; }
        .action-bar span { cursor: pointer; }

        #settings-menu { position: fixed; top: 0; left: -100%; width: 80%; height: 100%; background: var(--sidebar); z-index: 200; padding: 25px; transition: transform 0.3s ease; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        #settings-menu.open { transform: translateX(100%); }
        .menu-btn { width: 100%; background: #2d2d39; border: none; color: white; padding: 15px; text-align: left; margin-bottom: 12px; border-radius: 10px; cursor: pointer; }

        .footer { width: 100%; padding: 10px 15px 30px; background: var(--bg); flex-shrink: 0; }
        .input-container { max-width: 800px; margin: 0 auto; background: #40414f; border-radius: 15px; display: flex; align-items: center; padding: 10px 15px; border: 1px solid var(--border); }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
        .credits { font-size: 9px; color: #565869; margin-top: 8px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <button onclick="toggleMenu(true)" style="background:none; border:none; color:white; font-size:24px;">☰</button>
    <div class="title">Veda AI bot</div>
    <div class="user-info" id="header-user">User<br>VEDA-3606</div>
</header>

<div id="chat-box"></div>

<div class="footer">
    <div class="input-container">
        <button style="background:none; border:none; color:#8e8ea0; font-size:20px; margin-right:10px;">➕</button>
        <input type="text" id="user-in" placeholder="Message Veda AI..." autocomplete="off">
        <button onclick="handleSend()" style="background:none; border:none; color:var(--primary); font-size:24px;">⬆️</button>
    </div>
    <div class="credits">Created by Thoughts Sounds</div>
</div>

<div id="settings-menu">
    <h3 style="color:var(--primary); margin-bottom:20px;">Veda Settings</h3>
    <button class="menu-btn" onclick="changeName()">👤 Name change</button>
    <button class="menu-btn" onclick="downloadChat()">📩 Save chat</button>
    <button class="menu-btn" onclick="deleteHistory()">🗑 Delete History</button>
    <button class="menu-btn" onclick="manualFeedback()">📨 Feedback</button>
    <button class="menu-btn" onclick="location.reload()">🔄 Refresh</button>
    <div id="menu-info" style="font-size:11px; color:#8e8ea0; position:absolute; bottom:25px;"></div>
</div>

<script src="core.js"></script>
<script src="study.js"></script>
<script src="anime.js"></script>
<script src="creative.js"></script>

<script>
    const FORMSPREE_ID = "xwvrzgvj";
    let chatHistory = [];
    let vedaMemory = JSON.parse(localStorage.getItem('vedaMemory')) || {};
    let userName = localStorage.getItem('vedaName') || "User";
    let userID = "VEDA-3606";

    document.getElementById('header-user').innerHTML = `${userName}<br>${userID}`;

    // Swipe to Close
    let touchStartX = 0;
    const menu = document.getElementById('settings-menu');
    menu.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
    menu.addEventListener('touchmove', e => { if (touchStartX - e.touches[0].clientX > 60) toggleMenu(false); });

    function toggleMenu(s) {
        if(s) { menu.classList.add('open'); updateInfo(); }
        else { menu.classList.remove('open'); }
    }

    async function sendToDeveloper(subject, message) {
        try {
            await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: userName, id: userID, subject: subject, message: message })
            });
        } catch (e) { console.log("Report failed"); }
    }

    function addMessage(txt, sender) {
        const box = document.getElementById('chat-box');
        const container = document.createElement('div');
        container.className = `msg-container ${sender}`;
        let actions = sender === 'bot' ? `
            <div class="action-bar">
                <span onclick="speak(\`${txt}\`)">🔊</span>
                <span onclick="copy(\`${txt}\`)">📋</span>
                <span onclick="feedback(false, this, \`${txt}\`)">👎</span>
            </div>` : "";
        container.innerHTML = `<div class="bubble">${txt}</div>${actions}`;
        box.appendChild(container);
        box.scrollTop = box.scrollHeight;
        chatHistory.push({s: sender, t: txt});
    }

    async function handleSend() {
        const input = document.getElementById('user-in');
        const val = input.value.trim();
        if(!val) return;
        addMessage(val, 'user');
        input.value = ""; // Input Clear Fix
        let reply = await getReply(val.toLowerCase());
        setTimeout(() => addMessage(reply, 'bot'), 500);
    }

    async function getReply(q) {
        if (vedaMemory[q]) return vedaMemory[q] + " (Learned)";
        let dbs = [typeof vedaCore!=='undefined'?vedaCore:{}, typeof vedaStudy!=='undefined'?vedaStudy:{}, typeof vedaAnime!=='undefined'?vedaAnime:{}, typeof vedaCreative!=='undefined'?vedaCreative:{}];
        for(let db of dbs) { for(let key in db) { if(q.includes(key)) return db[key]; } }
        try {
            let res = await fetch(`https://hi.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
            let data = await res.json();
            if(data.extract) return data.extract;
        } catch(e) {}
        return "Maaf kijiye, mujhe iski jankari nahi mili.";
    }

    function feedback(isGood, el, botTxt) {
        el.style.color = "#ef4444";
        let correct = prompt("Sahi jawab kya hona chahiye tha?");
        if (correct) {
            let lastUserMsg = chatHistory.filter(m => m.s === 'user').pop();
            if(lastUserMsg) vedaMemory[lastUserMsg.t.toLowerCase()] = correct;
            localStorage.setItem('vedaMemory', JSON.stringify(vedaMemory));
            sendToDeveloper("Secret Report", `Q: ${lastUserMsg.t}\nBot: ${botTxt}\nCorrect: ${correct}`);
            alert("Seekh liya gaya hai!");
        }
    }

    function manualFeedback() {
        let msg = prompt("Feedback likhein:");
        if (msg) { sendToDeveloper("User Feedback", msg); alert("Bhej diya gaya!"); }
    }

    function downloadChat() {
        let log = chatHistory.map(m => `${m.s.toUpperCase()}: ${m.t}`).join('\n');
        let blob = new Blob([log], {type: 'text/plain'});
        let a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `Veda_Chat.txt`; a.click();
    }

    function changeName() {
        let n = prompt("Naya naam:");
        if(n) { localStorage.setItem('vedaName', n); location.reload(); }
    }

    function deleteHistory() { if(confirm("Delete?")) { chatHistory=[]; document.getElementById('chat-box').innerHTML=""; } }

    function updateInfo() { document.getElementById('menu-info').innerHTML = `V1.0 Stable | Cache: ${chatHistory.length}`; }

    document.getElementById('user-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    window.onload = () => addMessage("Namaste! Aaj main aapki kaise madad kar sakta hoon?", "bot");
</script>
</body>
</html>
